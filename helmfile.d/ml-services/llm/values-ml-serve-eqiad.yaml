inference_services:
  aya-llm:
    predictor:
      image: "machinelearning-liftwing-inference-services-llm"
      image_version: "2025-11-28-100340-publish"
      custom_env:
        - name: MODEL_NAME
          value: "aya-expanse-8B"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/llm/aya-expanse-8B/"
        - name: LLM_CLASS
          value: "llm.Aya"
        - name: BITSANDBYTES_DTYPE
          value: "int4"
        - name: DEVICE
          value: "auto"
        - name: ATTN_IMPLEMENTATION
          value: "flash_attention_2"
        - name: DTYPE
          value: "bfloat16"
      container:
        resources:
          limits:
            cpu: "6"
            memory: 8Gi
            amd.com/gpu: "1"
          requests:
            cpu: "6"
            memory: 8Gi
            amd.com/gpu: "1"
      config:
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
                        - "ml-serve1013.eqiad.wmnet"

  embeddings:
    predictor:
      image: "machinelearning-liftwing-inference-services-embeddings"
      image_version: "2026-03-04-145043-publish"
      custom_env:
        - name: MODEL_NAME
          value: "qwen3-embedding"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/qwen3-embedding-0.6b/20251218133542/"
        - name: MODEL_VERSION
          value: "Qwen3-Embedding-0.6B"
        - name: LOCAL_FILES_ONLY
          value: "True"
        - name: DTYPE
          value: "float16"
        - name: ATTN_IMPLEMENTATION
          value: "flash_attention_2"
        - name: MAX_LENGTH
          value: "500"
      container:
        resources:
          limits:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
          requests:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
      config:
        maxReplicas: 1
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
                        - "ml-serve1013.eqiad.wmnet"

  embeddings-staging:
    predictor:
      image: "machinelearning-liftwing-inference-services-embeddings"
      image_version: "2026-03-12-144127-publish"
      custom_env:
        - name: MODEL_NAME
          value: "qwen3-embedding-staging"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/qwen3-embedding-0.6b/20251218133542/"
        - name: MODEL_VERSION
          value: "Qwen3-Embedding-0.6B"
        - name: DTYPE
          value: "float16"
        - name: TRUST_REMOTE_CODE
          value: "False"
        - name: MAX_MODEL_LEN
          value: "32768"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "32768"
        - name: VLLM_ROCM_USE_AITER
          value: "1"
        - name: VLLM_USE_TRITON_FLASH_ATTN
          value: "0"
        - name: MAX_JOBS
          value: "1"
      container:
        resources:
          limits:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
          requests:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
      config:
        maxReplicas: 1
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
                        - "ml-serve1013.eqiad.wmnet"

  # policy-violation isvc
  gpt-oss-safeguard-20b:
    predictor:
      image: "machinelearning-liftwing-inference-services-policy-violation-gpt-oss-safeguard"
      image_version: "2026-04-02-072519-publish"
      custom_env:
        - name: MODEL_NAME
          value: "gpt-oss-safeguard-20b"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/gpt-oss-safeguard-20b/"
        - name: TIKTOKEN_ENCODINGS_BASE
          value: "/mnt/models/tiktoken_encodings/"
        - name: TRUST_REMOTE_CODE
          value: "False"
        - name: GPU_MEMORY_UTILIZATION
          value: "0.95"
        - name: MAX_MODEL_LEN
          value: "16384"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "24576"
        - name: MAX_NUM_SEQS
          value: "384"
        - name: BLOCK_SIZE
          value: "64"
        - name: ATTENTION_BACKEND
          value: "ROCM_AITER_UNIFIED_ATTN"
        - name: VLLM_ROCM_USE_AITER
          value: "1"
        - name: TENSOR_PARALLEL_SIZE
          value: "2"
        - name: DISABLE_CUSTOM_ALL_REDUCE
          value: "False"
        - name: TORCH_BLAS_PREFER_HIPBLASLT
          value: "1"
        - name: TORCH_SYMM_MEM_DISABLE_MULTICAST
          value: "1"
        - name: HSA_FORCE_FINE_GRAIN_PCIE
          value: "1"
        - name: HSA_ENABLE_IPC_MODE_LEGACY
          value: "0"
        - name: NCCL_P2P_DISABLE
          value: "0"
        - name: NCCL_SOCKET_IFNAME
          value: lo
        - name: NCCL_SHM_DISABLE
          value: "0"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: VLLM_SKIP_P2P_CHECK
          value: "0"
        - name: VLLM_HOST_IP
          value: "127.0.0.1"
        - name: RCCL_MSCCL_ENABLE
          value: "0"
        - name: MAX_JOBS
          value: "1"
        - name: AMDGCN_USE_BUFFER_OPS
          value: "0"
      container:
        resources:
          limits:
            cpu: "16"
            memory: 80Gi
            amd.com/gpu: "2"
          requests:
            cpu: "16"
            memory: 80Gi
            amd.com/gpu: "2"
        volumeMounts:
          - mountPath: /dev/shm
            name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "8Gi"
      config:
        maxReplicas: 1
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
