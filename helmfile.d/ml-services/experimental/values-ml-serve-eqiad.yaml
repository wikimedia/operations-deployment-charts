inference_services:

  # policy-violation isvc
  cope-a-9b:
    predictor:
      image: "machinelearning-liftwing-inference-services-policy-violation-cope-a-9b"
      image_version: "2026-07-07-081557-publish"
      custom_env:
        - name: MODEL_NAME
          value: "cope-a-9b"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/cope-a-9b-merged/"
        - name: MODEL_PATH
          value: "/mnt/models"
        - name: TRUST_REMOTE_CODE
          value: "False"
        - name: MAX_MODEL_LEN
          value: 4096
      container:
        resources:
          limits:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
          requests:
            cpu: "6"
            memory: 16Gi
            amd.com/gpu: "1"
      config:
        maxReplicas: 1
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
                        - "ml-serve1013.eqiad.wmnet"

  qwen36-27b:
    predictor:
      image: "machinelearning-liftwing-inference-services-qwen36"
      image_version: "2026-06-30-131041-publish"
      custom_env:
        - name: MODEL_NAME
          value: "qwen36-27b"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/llm/Qwen3.6-27B-FP8/"
        - name: MODEL_PATH
          value: "/mnt/models"
        - name: TRUST_REMOTE_CODE
          value: "True"
        - name: LANGUAGE_MODEL_ONLY
          value: "True"
        - name: SKIP_MM_PROFILING
          value: "True"
        - name: DTYPE
          value: "float16"
        - name: GPU_MEMORY_UTILIZATION
          value: "0.85"
        - name: MAX_MODEL_LEN
          value: "32768"
        - name: TENSOR_PARALLEL_SIZE
          value: "1"
        - name: MAX_NUM_SEQS
          value: "128"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "32768"
        - name: BLOCK_SIZE
          value: "64"
        - name: ATTENTION_BACKEND
          value: "TRITON_ATTN"
        - name: ENFORCE_EAGER
          value: "False"
        - name: VLLM_ROCM_USE_AITER
          value: "0"
        - name: TORCH_BLAS_PREFER_HIPBLASLT
          value: "1"
        - name: MAX_JOBS
          value: "1"
        - name: AMDGCN_USE_BUFFER_OPS
          value: "0"
      container:
        resources:
          limits:
            cpu: "16"
            memory: 32Gi
            amd.com/gpu: "1"
            ephemeral-storage: 40Gi
          requests:
            cpu: "16"
            memory: 32Gi
            amd.com/gpu: "1"
            ephemeral-storage: 35Gi
        volumeMounts:
          - mountPath: /dev/shm
            name: dshm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "8Gi"
      config:
        maxReplicas: 1
        timeout: 600
        tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoSchedule"
          - key: "dedicated"
            operator: "Equal"
            value: "mi300x-experiments"
            effect: "NoExecute"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: "kubernetes.io/hostname"
                      operator: "In"
                      values:
                        - "ml-serve1012.eqiad.wmnet"
