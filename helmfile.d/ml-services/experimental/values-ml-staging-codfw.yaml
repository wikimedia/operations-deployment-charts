inference_services:
  revertrisk-multilingual:
    annotations:
      autoscaling.knative.dev/target: "5"
    predictor:
      image: "machinelearning-liftwing-inference-services-revertrisk-multilingual"
      image_version: "2026-04-28-153227-publish"
      config:
        minReplicas: 5
        maxReplicas: 10
      custom_env:
        - name: MODEL_NAME
          value: "revertrisk-multilingual"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/revertrisk/multilingual/20230810110019/"
        - name: WIKI_URL
          value: "http://mw-api-int-ro.discovery.wmnet:4680"
        - name: FORCE_HTTP
          value: "true"
        - name: ALLOW_REVISION_JSON_INPUT
          value: "true"
        - name: EVENTGATE_URL
          value: "http://eventgate-main.discovery.wmnet:4480/v1/events"
        - name: EVENTGATE_STREAM
          value: "mediawiki.page_prediction_change.rc0"
      container:
        resources:
          limits:
            cpu: "6"
            memory: 10Gi
          requests:
            cpu: "6"
            memory: 10Gi
  editing-suggestions:
    predictor:
      image: "machinelearning-liftwing-inference-services-editing-suggestions"
      image_version: "2026-07-06-083804-publish"
      custom_env:
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/editing-suggestions/v1/20260701125423/"
        - name: MODEL_NAME
          value: "editing-suggestions"
      container:
        resources:
          limits:
            cpu: "8"
            memory: 16Gi
          requests:
            cpu: "2"
            memory: 4Gi

  tts:
    predictor:
      image: "machinelearning-liftwing-inference-services-tts"
      image_version: "2026-07-07-062223-publish"
      custom_env:
        - name: MODEL_NAME
          value: "tts"
        - name: STORAGE_URI
          value: "s3://wmf-ml-models/tts/"
      container:
        resources:
          limits:
            cpu: "8"
            memory: 16Gi
          requests:
            cpu: "8"
            memory: 16Gi

external_services_app_label_selector: app-wmf
external_services:
  cassandra:
  - ml-cache-a-eqiad
  - ml-cache-a-codfw
  - cassandra-dev-a-codfw
  - cassandra-dev-b-codfw
  - analytics-query-service-storage-a-codfw
  - analytics-query-service-storage-b-codfw
  - analytics-query-service-storage-a-eqiad
  - analytics-query-service-storage-b-eqiad
