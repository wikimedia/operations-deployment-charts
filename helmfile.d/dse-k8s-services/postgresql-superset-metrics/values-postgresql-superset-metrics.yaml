cluster:
  # Three instances on node-local storage: this gives us n+1 across the four
  # TopoLVM-enabled workers (dse-k8s-worker100[1-4], T432109), so that a
  # replacement replica can be re-cloned onto the spare node if a node fails.
  instances: 3

  # The default (vanilla) postgresql image, at major version 17.
  version: 17

  postgresql:
    # Comfortable headroom over the expected connection count: tens of
    # persistent Superset connections, plus a capped number of Spark
    # writer tasks.
    max_connections: "200"

  pg_hba:
  - host superset_metrics superset_metrics 10.0.0.0/8 scram-sha-256


  # Node-local storage (RAID1 SSD pairs, exposed by TopoLVM). PostgreSQL
  # streaming replication provides the redundancy and barman/S3 the disaster
  # recovery, so we avoid paying for Ceph replication on top: with
  # ceph-rbd-ssd every commit is written 3x over the network per instance.
  storage:
    size: 100Gi
    storageClass: topolvm-balanced
  walStorage:
    size: 30Gi
    storageClass: topolvm-balanced

  # With node-local storage, two instances must never share a node, so
  # anti-affinity is required rather than preferred (the chart default).
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname

  # Node drains are handled by the PodDisruptionBudgets that the operator
  # creates by default: the primary is switched over before its node drains
  # and only one instance is disrupted at a time. An evicted instance's
  # replacement pod stays Pending, bound to its node-local volume, and
  # rejoins with its existing data when the node returns. If a node is lost
  # permanently, delete the instance's PVC and pod, and the operator
  # re-clones a replacement replica onto the spare node.

  initdb:
    # The owner role defaults to the database name. Its credentials are
    # generated by the operator into the postgresql-superset-metrics-app
    # secret, for use by the Spark writer jobs (T432017).
    database: superset_metrics

ingress:
  # Expose the cluster outside of Kubernetes via SNI-based TLS passthrough,
  # for the Spark jobs on YARN which populate the data. Clients connect to
  # this hostname on port 31432 (the k8s-ingress-dse-postgresql LVS service)
  # with PostgreSQL 17 direct TLS negotiation, e.g.
  # jdbc:postgresql://postgresql-superset-metrics.svc.eqiad.wmnet:31432/superset_metrics?sslNegotiation=direct&sslmode=verify-full
  enabled: true
  hosts:
    - postgresql-superset-metrics.svc.eqiad.wmnet

pooler:
  # No PgBouncer: both clients hold few, long-lived connections. Superset
  # connects in-cluster through its own SQLAlchemy connection pool, and the
  # Spark writers are a bounded number of batch tasks arriving via the
  # ingress, so there is nothing for transaction pooling to multiplex. The
  # rw-only pooler would not help Superset's read traffic either. A pooler
  # can be added later without any client-side changes, if the number of
  # connections grows.
  enabled: false
