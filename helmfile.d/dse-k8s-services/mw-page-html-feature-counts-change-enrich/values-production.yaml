# WMF production main release specific values.

app:
  # These are set in common values.yaml file.
  # Change them here if you need to override them for the production release.
  #
  # version: v1.52.0
  # logConfiguration:
  #   rootLogger.level: INFO

  taskManager:
    # NOTE: parallelism == TM replicas * numberOfTaskSlots.
    replicas: 10
    resource:
      cpu: 1
      # This pipeline uses a little over 3000m in production, setting it to 4000m as buffer.
      memory: 4000m

  config_files:
    app.config.yaml:

      # Configs for eventutilities python stream_manager.
      stream_manager:
        job_name: mw-page-html-feature-counts-change-enrich


        # Configure sources and sinks.
        source:
          stream: mediawiki.page_html_content_change.v1:1.1.0
          # source parallelism should  be set to the number of input Kafka topic-partitions.
          # mediawiki.page_html_content_change.v1 is made up of two topics, but since it is hosted
          # in jumbo, only eqiad is active, which has 6 partition.
          parallelism: 12
          options:
            bootstrap_servers: kafka-jumbo-eqiad.external-services.svc.cluster.local:9093
            topics: [eqiad.mediawiki.page_html_content_change.v1]
            # Kafka consumer group naming follows convention: <job_name>__<k8s_cluster_name>
            consumer_group: mw-page-html-feature-counts-change-enrich__dse-k8s-eqiad.000
            # ONE-TIME RECOVERY (remove after the new partitions have caught up).
            # The topic was scaled 6 -> 12 partitions but the running job never
            # auto-discovered partitions 6-11, so their backlog was never consumed.
            # On a last-state restore, this initializer is applied ONLY to partitions
            # that are NOT in the restored checkpoint state:
            #   - old partitions 0-5  -> resume from checkpointed offsets (no reprocessing)
            #   - new partitions 6-11 -> not in state -> read from earliest (recovers backlog)
            # WARNING: revert this once recovered. If the job ever starts WITHOUT state
            # (stateless), 'earliest' replays ALL 12 partitions from the start of retention.
            # and not from the Kafka Consumer group offsets
            offsets_initializer: earliest

            properties:
              partition.discovery.interval.ms: "60000"

        sink:
          stream: mediawiki.page_html_feature_counts_change.v1:1.1.0
          options:
            bootstrap_servers: kafka-jumbo-eqiad.external-services.svc.cluster.local:9093
            kafka_topic_prefix: eqiad.

        # By convention we set job_name equal to k8s namespace.
        # Since this naming will contain hyphens, set the error_sink
        # stream name explicitly for production deployments.
        error_sink:
          stream: mw_page_html_feature_counts_change_enrich.error:2.1.0
          options:
            bootstrap_servers: kafka-jumbo-eqiad.external-services.svc.cluster.local:9093
            kafka_topic_prefix: eqiad.
  job:
    # TODO: we might consider setting
    # kubernetes.operator.job.upgrade.last-state.max.allowed.checkpoint.age.
    # to fallback on savepoints if checkpoints are too old.
    # This might require changing checkpoint retention policy.
    upgradeMode: last-state


  flinkConfiguration:
    # Parallelism == taskManager.replicas * numberOfTaskSlots.
    # Having fewer TMs results in slightly better resource allocation.
    # Increase numberOfTaskSlots here if more parallelization is needed.
    "taskmanager.numberOfTaskSlots": 1
    # Set the production release specific HA storageDir path.
    # Note: Naming convention is different than in mw-page-content-change-enrich due to swift template in flink chart
    "high-availability.storageDir": "s3://mw-page-html-feature-counts-change-enrich.dse-k8s-eqiad/production/high-availability"

flink:
  object_store:
    # Set the production release specific objectstore bucket
    swift_bucket: mw-page-html-feature-counts-change-enrich.dse-k8s-eqiad

external_services:
  kafka: [jumbo-eqiad]
