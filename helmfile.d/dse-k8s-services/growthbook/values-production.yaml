# We currently run a non-official release, which was built on a
# specific commit, to include a bugfix we care about
# (https://github.com/growthbook/growthbook/pull/5520)
image: &app_image repos/data-engineering/growthbook/next
version: &app_version 2026-05-16-084625-94450e0bf544fac0358ed1373425ea4edb5aa672@sha256:b6f9d6b485ed9663718aa81e793fecd5050bd5111c15d24133801936071a46b3
app_origin: &app_origin https://growthbook.wikimedia.org
api_host: &api_host https://growthbook-api.wikimedia.org

growthbook-backend:
  app:
    image: *app_image
    version: *app_version

  config:
    public: # See https://docs.growthbook.io/self-host/env
      APP_ORIGIN: *app_origin
      API_HOST: *api_host
      EMAIL_FROM: "growthbook@wikimedia.org"
    oidc:
      clientId: growthbook

  external_services:
    presto: [analytics]
    cas: [idp]

  ingress:
    gatewayHosts:
      default: "growthbook-api"
      extraFQDNs:
      - growthbook-api.wikimedia.org

growthbook-frontend:
  app:
    image: *app_image
    version:  *app_version

  config:
    public: # See https://docs.growthbook.io/self-host/env
      APP_ORIGIN: *app_origin
      API_HOST: *api_host

  ingress:
    gatewayHosts:
      default: "growthbook"
      extraFQDNs:
      - growthbook.wikimedia.org
