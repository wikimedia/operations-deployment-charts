config:
  airflow:
    instance_name: test-k8s
    auth:
      op_ldap_role: ~
    config:
      kubernetes_executor:
        worker_pods_creation_batch_size: 32
      kerberos:
        principal: analytics/airflow-test-k8s.discovery.wmnet
    extra_rbac:
    # DAGs create a scratch PVC on TopoLVM node-local storage at the start of
    # a run and delete it at the end (the scratch_pvc task factory in the
    # airflow-dags repository). See T428235.
    - apiGroups: [""]
      resources: ["persistentvolumeclaims"]
      verbs: ["create", "get", "list", "delete"]
  geoip:
    enabled: true
  oidc:
    idp_server: idp-test.wikimedia.org

external_services:
  webserver:
    # We login to airflow-test-k8s via the idp-test CAS server
    cas: [idp-test]
  task-pod:
    # The following are required by the growthbook-ldap-sync DAG
    gerrit: [wikimedia]
    ldap-ro: [eqiad, codfw]
    prometheus-pushgateway: [eqiad, codfw]

ingress:
  gatewayHosts:
    default: "airflow-test-k8s"
    extraFQDNs:
    - airflow-test-k8s.wikimedia.org
