# Kafka brokers also enable additional networkpolicy templates

# We deploy the external services network policies via helm hooks, to make them available
# for the Job resources also deployed by helm hooks. We deploy the network policies with
# a lower weight, to make them available _before_ the jobs run.
external_services_annotations:
  helm.sh/hook: pre-install,pre-upgrade
  helm.sh/hook-weight: "-10"  #  deploy external services before anything else
  helm.sh/hook-delete-policy: before-hook-creation
  helm.sh/resource-policy: keep  # keep the network policies around, otherwise they somehow get deleted, which breaks datahub altogether
external_services:
  mariadb: [analytics-meta]
  zookeeper: [main-eqiad]
  kafka: [jumbo-eqiad]

networkpolicy: &networkpolicies
  egress:
    dst_nets:
      - cidr: 10.2.2.71/32  # datahubsearch.svc.eqiad.wmnet

datahub_config: &datahub_config
  public: {}

datahub-frontend:
  main_app:
    version: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:caa8faa81b1e910a1d54bc03824421447bb4596018c067c516925aa37e2e75e9"
  auth:
    ldap:
      enabled: false
  datahub_config:
    <<: *datahub_config
    public:
      AUTH_JAAS_ENABLED: false
  mesh:
    enabled: true
  ingress:
    enabled: true
    gatewayHosts:
      default: "datahub-frontend"
      extraFQDNs:
        - datahub.wikimedia.org
  limits:
    memory: 4G
  external_services:
    kafka: [jumbo-eqiad]
    cas: [idp]
  networkpolicy:
    egress:
      dst_nets:
        - cidr: 10.2.2.71/32       # datahubsearch.svc.eqiad.wmnet
        - cidr: 208.80.154.252/32  # ldap-ro.eqiad.wikimedia.org
        - cidr: 208.80.153.252/32  # ldap-ro.codfw.wikimedia.org

datahub-gms:
  main_app:
    version: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:df66d87c494285ca3f3ab7a9f2827905065b2076a068353fa47ad5fa5db8f17a"
    requests:
      cpu: 2
      memory: 4G
    limits:
      cpu: 4
      memory: 8G
  datahub_config:
    public:
      AUTH_RESOURCES_DIR: "/datahub/datahub-gms/plugins/auth/resources"
      BOOTSTRAP_SYSTEM_UPDATE_WAIT_FOR_SYSTEM_UPDATE: false
  mesh:
    enabled: true
  ingress:
    enabled: true
    gatewayHosts:
      default: "datahub-gms"
  external_services:
    mariadb: [analytics-meta]
    kafka: [jumbo-eqiad]
  networkpolicy:
    <<: *networkpolicies

datahub-mce-consumer:
  main_app:
    version: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:5663b298bba00ee690eb9bc54f11644010025d5aa0f139de9d7dacb85ea0f04a"
    limits:
      cpu: 1
      memory: 2G
  external_services:
    mariadb: [analytics-meta]
    kafka: [jumbo-eqiad]
  networkpolicy:
    <<: *networkpolicies

datahub-mae-consumer:
  main_app:
    version: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:c274bb718ac7ca991414dbe9981ac084797e3799425c4a48cfed21d59af798b6"
    limits:
      cpu: 3
      memory: 4G
    requests:
      cpu: 1
      memory: 1G
  external_services:
    mariadb: [analytics-meta]
    kafka: [jumbo-eqiad]
  networkpolicy:
    <<: *networkpolicies

datahubSystemUpdate:
  image:
    tag: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:e9da2ab3dc05f73811282d9eafe0af0e6d2c79cc7bf95228ba2afb1393887d2c"
  resources:
    requests:
      cpu: 2
      memory: 2048Mi
    limits:
      cpu: 4
      memory: 2048Mi

datahubUpgrade:
  image:
    tag: "2026-06-29-222051-c4f4ed6903ddb12f550d3b298ba2cda4e3a45082@sha256:e9da2ab3dc05f73811282d9eafe0af0e6d2c79cc7bf95228ba2afb1393887d2c"

global:
  kafka:
    bootstrap:
      server: "kafka-jumbo-eqiad.external-services:9092"
    zookeeper:
      server: "conf1007.eqiad.wmnet:2181"
    schemaregistry:
      type: "INTERNAL"
  sql:
    datasource:
      host: "an-mariadb1001.eqiad.wmnet:3306"
      hostForMysqlClient: "an-mariadb1001.eqiad.wmnet"
      port: "3306"
      url: "jdbc:mysql://an-mariadb1001.eqiad.wmnet:3306/datahub?verifyServerCertificate=true&useSSL=true&useUnicode=yes&characterEncoding=UTF-8&enabledTLSProtocols=TLSv1.2"
      driver: "com.mysql.cj.jdbc.Driver"
      username: "datahub"
  elasticsearch:
    # In-namespace OpenSearch 2.x cluster (opensearch-datahub release), replacing the external
    # datahubsearch.svc.eqiad.wmnet cluster.
    host: "opensearch-datahub.datahub.svc.cluster.local"
    port: "9200"
    useSSL: true
    # Validate the server cert against the WMF CA.
    insecure: "false"
    # Pin the engine explicitly; the OpenSearch security plugin makes shim auto-detection
    # (which needs cluster-info access) unreliable.
    engineType: "OPENSEARCH_2"
    autoDetect: "false"
    indexPrefix: "production"
    # OpenSearch requires auth (anonymous 401s DataHub's client); password comes from the
    # elasticsearch_password secret key, set in the private hiera.
    auth:
      username: opensearch
