app:
  version: v1.3.9-prod

  service:
    user_agent: Test Kitchen UI/1.3 (#experiment-platform)

  logging:
    level: info

  database:
    database: test_kitchen_staging
    username: test_kitchen_staging

  listeners:
    action_api_basepath: http://127.0.0.1:6500

  idp:
    oidc_url: https://idp.wikimedia.org/oidc
    client_id: test_kitchen_next
    redirect_uri: https://test-kitchen-next.wikimedia.org/login/callback

  growthbook:
    run_poller: true
    # http://localhost:6048 is proxied to growthbook-api-next
    api_url: http://localhost:6048/api/v1/experiments
    saved_groups_url: http://localhost:6048/api/v1/saved-groups

ingress:
  gatewayHosts:
    extraFQDNs:
    - test-kitchen-next.wikimedia.org

discovery:
  listeners:
    - mw-api-int-async-ro
    - growthbook-api-next
