backend:
  volume:
    storageType: pvc
    storageClass: topolvm-performance
    size: 600Gi # 600Gi should be enough for 1 full index and 1 backup

qlever:
  version: master_2026-07-17T10-19-48Z_5e6d68c
  config:
    public:
      QLEVER_QUERY_TIMEOUT: 300s
  # Memory sizing (requests/limits memory + QLEVER_MAX_MEM/QLEVER_MAX_CACHE) is
  # set per-release so each dataset fits the wdqs namespace quota
  requests:
    cpu: 4
  limits:
    cpu: 10

init:
  version: v0.0.9
  config:
    public:
      NUM_BACKUPS: 1
      LOGLEVEL: DEBUG
  requests:
    cpu: 2
    memory: 2Gi
  limits:
    cpu: 2
    memory: 2Gi

consumer:
  version: v0.2.0
  config:
    public:
      BATCH_SIZE: 100000
      BUFFERED_INPUT_MESSAGES: 500
      BATCH_TIMEOUT: 10
      HEAP_SIZE: 2g
      LOG_LEVEL: DEBUG
  metricsPort: 9101

health:
  version: v0.0.2
  config:
    public:
      QUARKUS_LOG_CATEGORY__org.wikimedia.wdqs__LEVEL: DEBUG
      # Pool the pod as soon as the index is loaded, without waiting for the
      # consumer to catch up with Kafka lag. The health-monitor has no toggle
      # to disable the lag check, so we set the threshold effectively-infinite
      # to neutralise it. The index-loaded check (HEALTH_MONITOR_INDEX_*) still
      # gates the /probe startup check.
      HEALTH_MONITOR_UPDATE_LAG_THRESHOLD: 2147483647

proxy:
  version: v0.3.1

networkpolicy:
  egress:
    enabled: true

ingress:
  enabled: true

# gmodena:
# We need egress to gitlab (for the federation allow list), kafka main and S3 in both DCs.
# With maybe cross-dc requests allowed for S3 (do we run the datapipeline and # bucket active-active? Other can of worms).
#
# We also possibly need egress rules EventGate (analytics), if we don't end up producing query telemetry directly into kafka-main.

# And we need egress rules from qlever to federated endpoints (from the allow list).
external_services:
  gitlab:
    - wikimedia

# Enable scraping of Prometheus metrics
monitoring:
  enabled: true
  named_ports: true # scrape from all ports wth names ending in "-metrics"

affinity:
  # affinity to bind our backend pod to the wdqs nodes
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
          - key: dedicated
            operator: In
            values:
              - wdqs
  # affinity to prevent two instances of WDQS to run on the same node
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - wdqs
        topologyKey: "kubernetes.io/hostname"

# toleration to allow wdqs-backend pods to run on wdqs nodes
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "wdqs"
    effect: "NoSchedule"
  - key: "dedicated"
    operator: "Equal"
    value: "wdqs"
    effect: "NoExecute"
