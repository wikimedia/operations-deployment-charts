proxy:
  config:
    public:
      QUARKUS_REST_CLIENT_DOWNSTREAM_SPARQL_ENDPOINT_URL: http://wdqs-scholarly-internal-qlever-service:7001/sparql
      EVENTGATE_STREAM: wdqs_internal.sparql_query.v2
      EVENTGATE_GRAPH_NAME: scholarly_articles

ingress:
  gatewayHosts:
    default: wdqs2-scholarly-internal

mesh:
  certmanager:
    default_host: wdqs2-scholarly-internal


qlever:
  config:
    public:
      QLEVER_DBNAME: scholarly_articles
      QLEVER_MAX_MEM: 20G
      QLEVER_MAX_CACHE: 8G
  requests:
    memory: 8Gi
  limits:
    memory: 24Gi

init:
  config:
    public:
      NEW_INDEX_S3_BUCKET: wdqs-update-pipeline
      NEW_INDEX_S3_PATH: qlever-index/scholarly_articles
