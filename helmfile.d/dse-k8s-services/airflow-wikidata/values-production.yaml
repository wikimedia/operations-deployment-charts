config:
  airflow:
    instance_name: wikidata
    extra_rbac:
    # DAGs create a scratch PVC on TopoLVM node-local storage at the start of
    # a run and delete it at the end (the scratch_pvc task factory in the
    # airflow-dags repository). The qlever indexing pipeline uses this to
    # share a volume between its download, index and upload tasks. See T428235.
    - apiGroups: [""]
      resources: ["persistentvolumeclaims"]
      verbs: ["create", "get", "list", "delete"]
  connections:
    wikidata_platform_s3_dpe:
      conn_type: aws
      extra:
        endpoint_url: https://rgw.eqiad.dpe.anycast.wmnet
        region_name: dpe
        verify: /etc/ssl/certs/wmf-ca-certificates.crt
  extra_secrets:
    # Create a secret object with the same values as the corresponding airflow connection.
    # This may be useful if running a task based on a KubernetesPodOperator that does not use the airflow image.
    wikidata_platform_s3_dpe.yaml: |
      username: "{{ $.Values.config.connections.wikidata_platform_s3_dpe.login }}"
      password: "{{ $.Values.config.connections.wikidata_platform_s3_dpe.password }}"

ingress:
  gatewayHosts:
    default: "airflow-wikidata"
    extraFQDNs:
    - airflow-wikidata.wikimedia.org
