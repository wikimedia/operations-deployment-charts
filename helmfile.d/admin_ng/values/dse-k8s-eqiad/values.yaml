# These pod security labels are used to allow host paths in certain locations used by analytics workloads.
# the `include` security policies referenced in these labels are defined in
# charts/validating-admission-policies/templates/custom-policies
# These are used to mount /usr/share/GeoIP (the geoip mmdb files) into analytics workloads.
analytics-pss-labels: &analytics-pss-labels
  pod-security.wmf.org/profile: restricted
  pod-security.wmf.org/restrict-volume-types-restricted-volumes: exclude
  pod-security.wmf.org/disallow-host-path: exclude
  pod-security.wmf.org/allow-hostpath-analytics: include

# These pod security labels are applied on nodes related to mediawiki and dumps.
# They are here to allow the PTRACE capability (required by mediawiki), and
# allow the mounting of the geoip mmdb files.
mw-pss-labels: &mw-pss-labels
  pod-security.wmf.org/profile: restricted
  pod-security.wmf.org/restrict-volume-types-restricted-volumes: exclude
  pod-security.wmf.org/disallow-host-path: exclude
  pod-security.wmf.org/allow-hostpath-geoip: include
  pod-security.wmf.org/disallow-capabilities-strict-adding-capabilities-strict: exclude
  pod-security.wmf.org/disallow-capabilities-adding-capabilities: exclude
  pod-security.wmf.org/disallow-capabilities-except-ptrace: include

