# cluster_group is used to identify a group of similar clusters (like for one in eqiad and one in codfw)
# that share some config (values) in "admin_ng/values/<cluster_group>.yaml"
cluster_group: dse-k8s

# Defaults applied to all dse-k8s clusters
GlobalNetworkPolicies:
  # Allow icmp for all pods and all directions. Useful in debugging
  allow-all-icmp:
    namespaceSelector: 'has(projectcalico.org/name) && projectcalico.org/name != "kube-system"'
    types:
    - Ingress
    - Egress
    ingress:
    - action: Allow
      protocol: ICMP
    - action: Allow
      protocol: ICMPv6
    egress:
    - action: Allow
      protocol: ICMP
    - action: Allow
      protocol: ICMPv6
  default-deny:
    namespaceSelector: 'has(projectcalico.org/name) && projectcalico.org/name != "kube-system"'
    types:
    - Ingress
    - Egress
    egress:
      # Allow all namespaces to communicate to DNS pods
    - action: Allow
      protocol: UDP
      destination:
        services:
          name: "kube-dns"
          namespace: "kube-system"
  # This allows egress from all pods to all pods. Ingress still needs to be allowed by the destination, though.
  allow-pod-to-pod:
    namespaceSelector: 'has(projectcalico.org/name) && projectcalico.org/name != "kube-system"'
    types:
    - Egress
    egress:
    - action: Allow
      destination:
        nets:
            # eqiad
        - "10.67.24.0/21"
            # codfw
        - "10.192.96.0/21"
    - action: Allow
      destination:
        nets:
            # eqiad
        - "2620:0:861:302::/64"
            # codfw
        - "2620:0:860:308::/64"

# Context: https://knative.dev/docs/serving/tag-resolution/
docker:
  registry_cidrs:
  - '10.2.2.44/32'
  - '10.2.1.44/32'

# These are roles created to deploy charts with special permissions.
# Usually, these roles are created to deploy charts themselves containing rbac resources.
# The actual roles are created in helmfile.d/admin_ng/helmfile_rbac.yaml
deployExtraClusterRoles:
- "sparkapplications"
- "airflow"
- "mediawiki-dumps-legacy"
- "opensearch"
- "amdgpu-node-labeller"
- "spark-support"

# These pod security labels are used to allow host paths in certain locations used by analytics workloads.
# the `include` security policies referenced in these labels are defined in
# charts/validating-admission-policies/templates/custom-policies
# These are used to mount /usr/share/GeoIP (the geoip mmdb files) into analytics workloads.
pod-security-labels: &analytics-pss-labels
  pod-security.kubernetes.io/audit: restricted
  pod-security.kubernetes.io/enforce: restricted
  pod-security.kubernetes.io/warn: restricted
  pod-security.wmf.org/restrict-volume-types-restricted-volumes: exclude
  pod-security.wmf.org/disallow-host-path: exclude
  pod-security.wmf.org/allow-hostpath-analytics: include

# List all namespaces that should be created in every DSE-K8S cluster.
# For info about what overrides are available, please check ./common.yaml.
# When adding a new namespace, please keep the entries alphabetically sorted
namespaces:
  # The following namespace is used by the external-services chart,
  # and shouldn't be deployed to by another chart
  analytics:
    deployClusterRole: deploy-spark-support
    labels:
      <<: *analytics-pss-labels
      istio-injection: disabled
  analytics-test:
    deployClusterRole: deploy-spark-support
    labels:
      <<: *analytics-pss-labels
      istio-injection: disabled
  cert-manager:
    systemNamespace: true
    allowCriticalPods: true
    labels:
      istio-injection: disabled
  external-services:
    systemNamespace: true
    deployTLSCertificate: false

  istio-system:
    systemNamespace: true
    allowCriticalPods: true
    labels:
      istio-injection: disabled
  # knative-serving:
  #   systemNamespace: true
  #   allowCriticalPods: true
  #   deployTLSCertificate: true
  #   # See helmfile_namespace_certs.yaml for more info
  #   # The helmfile config deploys, by default, a TLS cert
  #   # with hostname == namespace for every non-system namespace.
  #   # In our case, we have only one istio TLS config that is deployed
  #   # via knative-serving.
  #   tlsHostnames:
  #     - inference
  #   labels:
  #     istio-injection: disabled
  # kserve:
  #   systemNamespace: true
  #   allowCriticalPods: true
  #   labels:
  #     control-plane: kserve-controller-manager
  #     controller-tools.k8s.io: "1.0"
  #     istio-injection: disabled
  kube-system:
    systemNamespace: true
    allowCriticalPods: true
    labels:
      istio-injection: disabled
  opensearch-apifeatureusage: {}
  opensearch-apifeatureusage-test: {}
  opensearch-ipoid: {}
  opensearch-ipoid-test: {}
  opensearch-operator: {}
  opensearch-operator-3: {}
  opensearch-semantic-search:
    resourcequota:
      compute:
        requests:
          cpu: "100"
          memory: "800Gi"
        limits:
          cpu: "100"
          memory: "800Gi"
  opensearch-semantic-search-test: {}
  opensearch-test: {}
  opensearch-toolhub: {}
  opensearch-toolhub-test: {}
  opensearch-ttmserver: {}
  opensearch-ttmserver-test: {}
  sidecar-controller:
    systemNamespace: true
  wdqs:
    tlsHostnames:
    - wdqs2-main-internal
    - wdqs2-main-external
    - wdqs2-scholarly-internal
    - wdqs2-scholarly-external
    tlsExtraSANs:
    - query-next.wikidata.org
    - query-scholarly-next.wikidata.org
    limitranges:
      container:
        min:
          memory: "300Mi"
          cpu: "100m"
        max:
          memory: "128Gi"
          cpu: "12"
        defaultRequest:
          memory: "2000Mi"
          cpu: "500m"
        default:
          memory: "2000Mi"
          cpu: "500m"
      pod:
        min:
          memory: "300Mi"
          cpu: "100m"
        max:
          memory: "128Gi"
          cpu: "12"
  wdqs-next:
    tlsHostnames:
    - wdqs2-next-main-internal
    - wdqs2-next-main-external
    - wdqs2-next-scholarly-internal
    - wdqs2-next-scholarly-external
    limitranges:
      container:
        min:
          memory: "300Mi"
          cpu: "100m"
        max:
          memory: "128Gi"
          cpu: "12"
        defaultRequest:
          memory: "2000Mi"
          cpu: "500m"
        default:
          memory: "2000Mi"
          cpu: "500m"
      pod:
        min:
          memory: "300Mi"
          cpu: "100m"
        max:
          memory: "128Gi"
          cpu: "12"

istio:
  gateways:
    ingressgateway:
      ports:
      - 8443
        # knative-local-gateway (not exposed via NodePort),
        # only for internal traffic.
      - 8081
net_istio:
  ingressgateway:
    servers:
    # The 'hosts' field correspond to the list of backend routes that
    # Knative/Istio will allow/configure on the Gateway. For example,
    # if the FQDN for a Kfserving backend is something-test.example.com,
    # we can allow it in multiple ways:
    # 1) More specific: 'something-test.example.com'
    # 2) Less specific: '*.example.com'
    # 3) All traffic allowed: '*'
    # For the moment option 3) is fine, but we'll need to review the choice.
    - hosts:
      - '*'
      port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        mode: SIMPLE
        minProtocolVersion: 'TLSV1_2'
        # Please note:
        # This corresponds to the name of a TLS Secret deployed
        # to the istio-system namespace. We deploy it via
        # helmfile_namespace_certs.yaml.
        credentialName: knative-serving-tls-certificate

# Override from default config (see ./common.yaml) to lower the min cpu limit
# from 100m to 25m (kserve sidecar default settings).
limitranges:
  container:
    min:
      cpu: "25m"
    # Allow containers such as spark to request more memory than the common limit (3GB)
    max:
      memory: "8Gi"
  pod:
    max:
      memory: "10Gi"


# Override from default config (see ./common.yaml) to allow deployments of
# big namespaces with a lot of pods.
resourcequota:
  pods: {}
  compute:
    requests:
      cpu: "150"
      memory: "150Gi"
    limits:
      cpu: "150"
      memory: "150Gi"


priorityClasses:
- name: low-priority-pod
  value: -100
  description: "Priority class used by non-critical non-system pods, to ensure they
    get evicted first under resource pressure"
