# The list of namespaces in which opensearch clusters are deployed.
# If you plan to deploy a cluster to a new namespace, you'll need to add it in there
# (please keep the list sorted) and apply admin_ng
manager:
  watchNamespace:
  - opensearch-apifeatureusage
  - opensearch-apifeatureusage-test
  - opensearch-ipoid
  - opensearch-ipoid-test
  - opensearch-semantic-search
  - opensearch-semantic-search-test
  - opensearch-test
  - opensearch-toolhub
  - opensearch-toolhub-test
  - opensearch-ttmserver
  - opensearch-ttmserver-test
