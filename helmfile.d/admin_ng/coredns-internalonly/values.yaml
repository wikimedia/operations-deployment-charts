k8s_app: kube-dns-internalonly
internal_only: true

replicaCount: 2

service:
  nodePort: 53

image:
  repository: docker-registry.discovery.wmnet/coredns
  pullPolicy: IfNotPresent

resources:
  limits:
    memory: 170Mi
  requests:
    cpu: 100m
    memory: 70Mi

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values:
                  - kube-dns-internalonly
