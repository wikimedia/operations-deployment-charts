main_app:
  image: repos/wmde/wikidata-query-builder
  version: 2025-07-17-122349
  readiness_probe:
    httpGet:
      path: /querybuilder

ingress:
  enabled: true
  existingGatewayName: "miscweb-wikidata-query-next-gui"
  routeHosts:
  - query-next.wikidata.org
  httproutes:
  - match:
    - uri:
        prefix: /querybuilder
    route:
    - destination:
        host: miscweb-wikidata-query-next-builder-tls-service.wikidata-query-gui.svc.cluster.local
        port:
          number: 8081