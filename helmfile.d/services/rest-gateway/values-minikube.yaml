# Local development overrides for the rest-gateway service on minikube.
#
# These values are loaded on top of values.yaml and values-staging.yaml when
# running `make check` from the `tests` directory, or `make install` or
# `make check env=minikube` from the chart tests directory (charts/api-gateway/tests/).
#
# DO NOT make personal or machine-specific changes to this file.
# Instead, put your local overrides in values-minikube.local.yaml (git-ignored).
# the Makefile loads that file last so it takes precedence over this file.

main_app:
  command: ~

  # Enable debug-level logging in Envoy.
  args: ["-l", "debug"]

  # Expose a telemetry port for Envoy stats and health checks.
  telemetry_port: 8089

  # Use the http-https-echo sidecar as a fake upstream. It echoes request headers
  # back as a JSON response, which is useful for inspecting routing, JWT, and
  # rate-limiting behaviour without a real upstream service.
  http_https_echo: true

  # Spin up a Redis sidecar for the rate limiter, so no external Redis is needed.
  dev_redis: true
  redis_port: 6380 # must match nutcracker.port below

  # Accept requests from localhost and minikube addresses.
  domains:
    - localhost
    - localhost:*
    - 127.0.0.1
    - 127.0.0.1:*
    - restgateway.discovery.wmnet
    - mytestdomain.discovery.wmnet

  # Point all discovery endpoints at the http-https-echo sidecar (port 8888).
  discovery_endpoints:
    citoid:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    geo-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    media-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    mobileapps:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    proton:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    wikifeeds:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    device-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    page-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    edit-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    editor-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    commons-impact-analytics:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost
    mw-api-ext-ro:
      tls: false
      port: 8888
      internal_host: localhost
      host: localhost

  jwt:
    enabled: true
    issuer: http://dev.wikipedia.org

  jwks:
    # Use a symmetric OCT key for local testing so tokens can be generated easily.
    # Production deployments must use RSA keys.
    type: "OCT"
    kid: "testkey"
    # the key is "testsecret" stored as base64
    key: "dGVzdHNlY3JldA=="

nutcracker:
  enabled: true
  port: 6380 # use a different port because the dev_redis sidecar listens on 6379
  servers:
    - localhost:6379:1 "cp-1" # dev_redis sidecar

smokepy:
  gateway:
    # The URL the smoke tests will send requests to.
    # Can also be set via the $GATEWAY_TEST_TARGET_URL environment variable.
    target_url: http://localhost:8087
    host: localhost
    wikilambda_host: localhost

service:
  deployment: minikube
  port:
    name: api-gateway
    targetPort: 8087
    port: 8087
    nodePort: null
config:
  public: {}
  private: {}

# This chart does not actually use the tls-proxy/service mesh like others do
# but it incorporates parts of it (for TLS termination), so we use the same
# config structure here.
mesh:
  enabled: false
  certs:
    cert: "snakeoil"
    key: "snakeoil"
  certmanager:
    enabled: false
  # public_port must be set in order for the cert-manager certificate to be
  # rendered. It is not used for anything else.
  public_port: "Value that evaluates to true but is not a valid port"

networkpolicy:
  egress:
    enabled: false

external_services:
  redis-6380: []
