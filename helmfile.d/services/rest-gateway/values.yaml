resources:
  # Bump to accomodate enwiki action API routing
  replicas: 8

main_app:
  version: 1.35.9-1
  telemetry_port: 1667

  access_log:
    # Disable access log but enable 5xx logging, sample 20% of 429 and 1% of the rest
    enabled: false
    sample_percentage: 1
    ratelimit_sample_percentage: 20

  requests:
    cpu: 1
    memory: 1Gi
  limits:
    cpu: ~
    memory: ~

  jwt:
    enabled: true
    issuer: https://meta.wikimedia.org

  ratelimiter:
    # Disable cpu/ram limits
    limits:
      cpu: ~
      memory: ~
    # use nutcracker sidecar
    redis_host: localhost
    redis_port: 6379
    key_prefix: "restgw_"

    # T406498 phase 5: API ratelimit dry run.
    # Enable ratelimit in shadow mode for all users.
    enabled: true
    version: 9.0.4-20260107.e9ce92c
    default_policies: [ Mar2026, Apr2026 ]
    fallback_class: anon    # class to use when no rule matches

    # Some x-is-browser scores as determined in March 2026:
    # InstantCommons typically comes in at 30.
    # WikipediaApp mostly comes in at 45, but some requests at 25.
    browser_threshold: 35

    # Based on manual data analysis in March2026
    # (IPs with many hits, varying User-Agents, and high index.php usage)
    anon_class_by_address:
      "114.42.196.147":    "anon-cgnat" # Chunghwa Telecom, Taiwan
      "103.129.180.230":   "anon-cgnat" # Akari Networks, Taiwan
      "109.169.115.209":   "anon-cgnat" # Obos Nett
      "82.42.66.138":      "anon-cgnat" # Virgin Media
      "178.88.101.75":     "anon-cgnat" # JSC Kazakhtelecom
      "185.163.229.94":    "anon-cgnat" # Adista
      "193.197.73.9":      "anon-cgnat" # BelWue University Network, Germany
      "193.197.148.126":   "anon-cgnat" # BelWue University Network, Germany
      "80.228.52.131":     "anon-cgnat" # EWE-Tel, Germany
      "43.251.172.11":     "anon-cgnat" # Meghbela Broadband
      "136.152.226.248":   "anon-cgnat" # University of California at Berkeley
      "200.130.101.130":   "anon-cgnat" # Rede Nacional de Ensino e Pesquisa
      "129.115.236.164":   "anon-cgnat" # University of Texas at San Antonio
      "165.124.149.52":    "anon-cgnat" # Northwestern University
      "137.99.79.133":     "anon-cgnat" # University of Connecticut
      "131.230.106.129":   "anon-cgnat" # Southern Illinois University Carbondale
      "193.147.165.55":    "anon-cgnat" # Entidad Publica Empresarial Red.es
      "35.129.119.150":    "anon-cgnat" # Spectrum
      "210.162.49.20":     "anon-cgnat" # NTT DOCOMO BUSINESS, Japan
      "185.24.187.194":    "anon-cgnat" # La Direction Interministerielle Du Numerique
      "217.109.129.254":   "anon-cgnat" # Orange, France
      "240f:141:13fb:1:d61:1492:1020:9e5d": "anon-cgnat" # au one net
      "2001:6b0:17:2004::56:212":           "anon-cgnat" # Swedish University Network
    allow_client_headers: false        # TESTING: allow clients to pass in rate limit headers
    enable_x_ratelimit_headers: false  # include x-ratelimit headers in responses
    key_log_format: "%REQ(x-wmf-ratelimit-class)%:%REQ(x-wmf-user-id)%"

    units: [ HOUR, MINUTE ]
    policies:
      # NOTE: the policy name should change when the name or semantics of classes change,
      # to avoid confusing the metrics.
      "Mar2026":
        shadow_mode: false
        limits:
          "*": # catch-all limits
            HOUR: 500
          "anon": # no auth, not a browser, no good User-Agent, no known IP
            HOUR: 500
          "unauthed-bot": # no auth, but good User-Agent -- temp?
            HOUR: 9999999 # 5000
          "unauthed-mediawiki": # InstantCommons and such
            HOUR: 9999999 # 10000
          "anon-browser": # no auth, but looks like a browser
            HOUR: 1000
          "anon-cgnat": # Carrier Grade NAT: many clients using a single IP
            HOUR: 250000 # needs high limit until we can distinguish clients
          "authed-user": # valid JWT
            HOUR: 9999999 # 10000
          "established-user": # valid JWT, meets age/edit count criteria
            HOUR: 9999999 # 100000
          "highlimits-user": # valid WT and member of specific global groups
            HOUR: 9999999 # no limit
          "known-network": # no auth, network under our control (WMCS, WME)
            HOUR: 9999999
          "approved-bot": # community approved bot, based on jwt auth
            HOUR: 9999999
          "known-client": # no auth, network associated with a known client
            HOUR: 9999999

      "Apr2026":
        shadow_mode: true
        limits:
          "*": # catch-all limits
            MINUTE: 10
          "anon": # no auth, not a browser, no good User-Agent, no known IP
            MINUTE: 10
          "unauthed-bot": # no auth, but good User-Agent -- temp?
            MINUTE: 100
          "unauthed-mediawiki": # InstantCommons and such
            MINUTE: 100
          "anon-browser": # no auth, but looks like a browser
            MINUTE: 200
          "anon-cgnat": # Carrier Grade NAT: many clients using a single IP
            MINUTE: 4000 # needs high limit until we can distinguish clients
          "authed-user": # valid JWT
            MINUTE: 200
          "established-user": # valid JWT, meets age/edit count criteria
            MINUTE: 2000
          "highlimits-user": # valid WT and member of specific global groups
            MINUTE: 999999
          "known-network": # no auth, network under our control (WMCS, WME)
            MINUTE: 999999
          "approved-bot": # community approved bot, based on jwt auth
            MINUTE: 999999
          "known-client": # no auth, network associated with a known client
            MINUTE: 999999

      # Preliminary limits for abstract.wikipedia.org.
      # Abstract Wikipedia requires a LOT of API queries, they need to have a separate bucket
      # to avoid locking users out of other things inadvertently. We also set higher limits,
      # but we need to be careful about that, since some of the endpoints are quite expensive.
      "AbstractWiki":
        shadow_mode: false
        limits:
          "*": # catch-all limits
            HOUR: 1000
          "anon": # no auth, not a browser, no good User-Agent, no known IP
            HOUR: 1000
          "unauthed-bot": # no auth, but good User-Agent
            HOUR: 1000 # this is quite restrictive, but the endpoints are expensive
          "unauthed-mediawiki": # InstantCommons and such
            HOUR: 10000
          "anon-browser": # no auth, but looks like a browser
            HOUR: 10000 # a single page view can easily go over 1000 requests...
          "anon-cgnat": # Carrier Grade NAT: many clients using a single IP
            HOUR: 250000 # needs high limit until we can distinguish clients
          "authed-user": # valid JWT
            HOUR: 9999999 # 100_000
          "established-user": # valid JWT, meets age/edit count criteria
            HOUR: 9999999 # 1_000_000
          "highlimits-user": # valid WT and member of specific global groups
            HOUR: 9999999 # no limit
          "known-network": # no auth, network under our control (WMCS, WME)
            HOUR: 9999999
          "approved-bot": # community approved bot, based on jwt auth
            HOUR: 9999999
          "known-client": # no auth, network associated with a known client
            HOUR: 9999999

  domains:
    - rest-gateway.discovery.wmnet
    - rest-gateway.discovery.wmnet:*
    - rest-gateway-ro.discovery.wmnet
    - rest-gateway-ro.discovery.wmnet:*
    - "*.wikipedia.org"
    - "*.m.mediawiki.org"
    - "*.m.wikibooks.org"
    - "*.m.wikidata.org"
    - "*.m.wikimedia.org"
    - "*.m.wikimediafoundation.org"
    - "*.m.wikinews.org"
    - "*.m.wikipedia.org"
    - "*.m.wikiquote.org"
    - "*.m.wikisource.org"
    - "*.m.wikiversity.org"
    - "*.m.wikivoyage.org"
    - "*.m.wiktionary.org"
    - "*.mediawiki.org"
    - "*.planet.wikimedia.org"
    - "*.wikibooks.org"
    - "*.wikidata.org"
    - "*.wikimedia.org"
    - "*.wikimediafoundation.org"
    - "*.wikinews.org"
    - "*.wikiquote.org"
    - "*.wikisource.org"
    - "*.wikiversity.org"
    - "*.wikivoyage.org"
    - "*.wiktionary.org"
    - "*.wmfusercontent.org"
    - "*.zero.wikipedia.org"
    - mediawiki.org
    - w.wiki
    - wikibooks.org
    - wikidata.org
    - wikimedia.org
    - wikimediafoundation.org
    - wikinews.org
    - wikiquote.org
    - wikisource.org
    - wikiversity.org
    - wikivoyage.org
    - wiktionary.org
    - wmfusercontent.org
    - wikipedia.org
    # required for service mesh
    - "localhost:6033"

  # FOOTGUN ALERT: routes are strictly ordered. This means that if you
  # have multiple rules that potentially overlap, the LESS general
  # case should be first. For example, it's very common for
  # post-restbase rules to support PATH/PAGE/REVISION and
  # PATH/PAGE. If you define a (.+) regex for PATH/PAGE *before*
  # PATH/PAGE/REVISION, this rule will get matched first and
  # PAGE/REVISION will be passed as a single capture group
  rest_gateway_routes:
    - name: mobileapps
      timeout: 120s
      urls:
        #TODO tighten capture group criteria
        - name: ma_mobile_revision
          in: '/+([^/]+)/v1/page/mobile-html/(.+)/(.+)'
          out: '/\1/v1/page/mobile-html/\2/\3'
        - name: ma_mobile_no_revision
          in: '/+([^/]+)/v1/page/mobile-html/(.+)'
          out: '/\1/v1/page/mobile-html/\2'
        - name: ma_summary_revision
          in: '/+([^/]+)/v1/page/summary/(.+)/(.+)'
          out: '/\1/v1/page/summary/\2/\3'
        - name: ma_summary_no_revision
          in: '/+([^/]+)/v1/page/summary/(.+)'
          out: '/\1/v1/page/summary/\2'
        - name: ma_media_list_revision
          in: '/+([^/]+)/v1/page/media-list/(.+)/(.+)'
          out: '/\1/v1/page/media-list/\2/\3'
        - name: ma_media_list_no_revision
          in: '/+([^/]+)/v1/page/media-list/(.+)'
          out: '/\1/v1/page/media-list/\2'
        - name: ma_mobile_html_offline_resources
          in: '/+([^/]+)/v1/page/mobile-html-offline-resources/(.+)/(.+)'
          out: '/\1/v1/page/mobile-html-offline-resources/\2/\3'
        - name: ma_mobile_html_offline_resources_no_revision
          in: '/+([^/]+)/v1/page/mobile-html-offline-resources/(.+)'
          out: '/\1/v1/page/mobile-html-offline-resources/\2'
        - name: ma_data_css_mobile
          in: '/+([^/]+)/v1/data/css/mobile/(.+)'
          out: '/\1/v1/data/css/mobile/\2'
        - name: ma_data_javascript_mobile
          in: '/+([^/]+)/v1/data/javascript/mobile/(.+)'
          out: '/\1/v1/data/javascript/mobile/\2'
        - name: ma_data_i18n
          in: '/+([^/]+)/v1/data/i18n/(.+)/(.+)'
          out: '/\1/v1/data/i18n/\2/\3'
        - name: ma_data_i18n_no_revision
          in: '/+([^/]+)/v1/data/i18n/(.+)'
          out: '/\1/v1/data/i18n/\2'
        - name: ma_page_talk
          in: '/+([^/]+)/v1/page/talk/(.+)/(.+)'
          out: '/\1/v1/page/talk/\2/\3'
        - name: ma_page_talk_no_revision
          in: '/+([^/]+)/v1/page/talk/(.+)'
          out: '/\1/v1/page/talk/\2'
        - name: ma_page_definition
          in: '/+([^/]+)/v1/page/definition/(.+)/(.+)'
          out: '/\1/v1/page/definition/\2/\3'
        - name: ma_page_definition_no_revision
          in: '/+([^/]+)/v1/page/definition/(.+)'
          out: '/\1/v1/page/definition/\2'
        - name: ma_transform_wikitext_mobile_html
          in: '/+([^/]+)/v1/transform/wikitext/to/mobile-html/(.+)'
          out: '/\1/v1/transform/wikitext/to/mobile-html/\2'
      rb_response_headers: true

    - name: mobileapps_core
      cluster: mobileapps
      timeout: 120s
      urls:
        - name: descriptions
          in: '/+core/v1/(\w+)/(\w+)/page/(.*)/description'
          out: '/\2.\1.org/v1/page/description/\3'

    - name: proton
      timeout: 150s
      urls:
        # Proton doesn't actually support not passing a format - restbase usually adds this
        - name: proton_title
          in: '/+([^/]+)/v1/page/pdf/([^/]+)'
          out: '/\1/v1/pdf/\2/a4'
        - name: proton_title_format
          in: '/+([^/]+)/v1/page/pdf/(.+)/\b(a4|legal|letter)\b'
          out: '/\1/v1/pdf/\2/\3'
        - name: proton_title_format_type
          in: '/+([^/]+)/v1/page/pdf/(.+)/\b(a4|legal|letter)\b/(.+)'
          out: '/\1/v1/pdf/\2/\3/\4'
      rb_response_headers: true

    - name: citoid
      timeout: 120s
      ingress: true
      urls:
          # We ignore the sitename (first matching group).
          # It is assumed the URL will be properly encoded here - ie /
          # replaced by %2F if needs be
        - name: citoid_query
          in: '/+([^/]+)/v1/data/citation/(.+)/(.+)'
          out: '/\2/\3'
      rb_response_headers: true

    - name: wikifeeds
      timeout: 15s
      urls:
        - name: apiwo_announcements
          in: '/+feed/v1/(\w+)/(\w+)/announcements'
          out: '/\2.\1.org/v1/feed/announcements'
        - name: announcements
          in: '/+([^/]+)/v1/feed/announcements'
          out: '/\1/v1/feed/announcements'
        - name: apiwo_onthisday_all
          in: '/+feed/v1/(\w+)/(\w+)/onthisday/all/(.+)/(.+)'
          out: '/\2.\1.org/v1/aggregated/onthisday/all/\3/\4'
        - name: onthisday_all
          in: '/+([^/]+)/v1/feed/onthisday/all/(.+)/(.+)'
          out: '/\1/v1/aggregated/onthisday/all/\2/\3'
        - name: apiwo_onthisday
          in: '/+feed/v1/(\w+)/(\w+)/onthisday/(.+)/(.+)/(.+)'
          out: '/\2.\1.org/v1/feed/onthisday/\3/\4/\5'
        - name: onthisday
          in: '/+([^/]+)/v1/feed/onthisday/(.+)/(.+)/(.+)'
          out: '/\1/v1/feed/onthisday/\2/\3/\4'
        - name: apiwo_featured
          in: '/+feed/v1/(\w+)/(\w+)/featured/(.+)/(.+)/(.+)'
          out: '/\2.\1.org/v1/aggregated/featured/\3/\4/\5'
        - name: featured
          in: '/+([^/]+)/v1/feed/featured/(.+)/(.+)/(.+)'
          out: '/\1/v1/aggregated/featured/\2/\3/\4'
        - name: apiwo_availability
          in: '/+feed/v1/(\w+)/(\w+)/availability'
          out: '/\2.\1.org/v1/feed/availability'
        - name: availability
          in: '/+([^/]+)/v1/feed/availability'
          out: '/\1/v1/feed/availability'
        - name: apiwo_configuration
          in: '/+feed/v1/(\w+)/(\w+)/configuration'
          out: '/\2.\1.org/v1/feed/configuration'
        - name: configuration
          in: '/+([^/]+)/v1/feed/configuration'
          out: '/\1/v1/feed/configuration'
        - name: apiwo_dyk
          in: '/+feed/v1/(\w+)/(\w+)/dyk'
          out: '/\2.\1.org/v1/feed/dyk'
        - name: dyk
          in: '/+([^/]+)/v1/feed/did-you-know'
          out: '/\1/v1/feed/did-you-know'
        - name: apiwo_random
          in: '/+feed/v1/(\w+)/(\w+)/page/random/(.+)'
          out: '/\2.\1.org/v1/page/random/redirect/\3'
        - name: random
          in: '/+([^/]+)/v1/page/random/(.+)'
          out: '/\1/v1/page/random/redirect/\2'
      rb_response_headers: true

    - name: geo-analytics
      timeout: 15s
      ingress: true
      urls:
