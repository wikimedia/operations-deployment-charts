    - name: editor-analytics
      timeout: 5s
      ingress: true
      urls:
        - name: api-spec
          in: '/+wikimedia.org/v1/metrics/editors/api-spec.json'
          out: '/editors/api-spec.json'
        - name: edits
          in: '/+wikimedia.org/v1/metrics/editors/(.+)'
