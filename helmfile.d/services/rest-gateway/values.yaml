          out: '/metrics/edits/\1'
        - name: bytes_difference
          in: '/+wikimedia.org/v1/metrics/bytes-difference/(.+)'
          out: '/metrics/bytes-difference/\1'
        - name: edited_pages
          in: '/+wikimedia.org/v1/metrics/edited-pages/(.+)'
          out: '/metrics/edited-pages/\1'
