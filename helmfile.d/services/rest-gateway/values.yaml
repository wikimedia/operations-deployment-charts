      rb_response_headers: true

    - name: mw-api-ext
      timeout: 15s
      # The name is misleading, as it's not a different deployment than mw-api-ext
      # However, in normal operation, it always points to the DC-local deployment.
      # As long as ATS multi-DC routing does the right thing, this will allow requests
      # sent from ATS to the secondary datacenter to stay there instead of crossing back
      # to the primary.
      cluster: mw-api-ext-ro
      request_headers_to_add:
        - key: x-restbase-compat
          value: true
      stat_prefix: restbase-compat
      urls:
        # T374683
        # NOTE: Revision regexps come first as the title regexps are broad
        # enough to match the revision ones as well, ordering to the rescue
        # NOTE: The REST gateway, in the same spirit as RESTBase before it,
        # assumes the caller will be URL encoding the page titles so that if
        # they have slashes in them.
        #
        # e.g. Foo/Bar/Baz should become Foo%2FBar%2FBaz
        #
        # before reaching REST gateway.
        # In case a non URL encoded page with slashes is submitted, it's the
        # duty of MediaWiki to return the appropriate response (and MediaWiki
        # does return a 404)
        - name: page-metadata-revision
          in: '/+([^/]+)/v1/page/title/([^\/]+)/(.+)'
          out: '/w/rest.php/v1/revision/\3/bare'
        - name: page-metadata-title
          in: '/+([^/]+)/v1/page/title/(.+)'
          out: '/w/rest.php/v1/page/\2/bare'
        - name: page-html-revision
          in: '/+([^/]+)/v1/page/html/([^\/]+)/(.+)'
          out: '/w/rest.php/v1/revision/\3/html'
        - name: page-html-title
          in: '/+([^/]+)/v1/page/html/(.+)'
          out: '/w/rest.php/v1/page/\2/html'
        - name: page-lint-revision
          in: '/+([^/]+)/v1/page/lint/([^\/]+)/(.+)'
          out: '/w/rest.php/v1/revision/\3/lint'
        - name: page-lint-title
          in: '/+([^/]+)/v1/page/lint/([^\/]+)'
          out: '/w/rest.php/v1/page/\2/lint'
        - name: transform_wikitext_to_html
          in: '/+([^/]+)/v1/transform/wikitext/to/html(.*)'
          out: '/w/rest.php/v1/transform/wikitext/to/html\2'
        - name: transform_html_to_wikitext
          in: '/+([^/]+)/v1/transform/html/to/wikitext(.*)'
          out: '/w/rest.php/v1/transform/html/to/wikitext\2'
        - name: transform_wikitext_to_lint
          in: '/+([^/]+)/v1/transform/wikitext/to/lint(.*)'
          out: '/w/rest.php/v1/transform/wikitext/to/lint\2'
        # reading lists endpoint - supports all HTTP verbs for various options
        # Note use of * rather than + in regex - needed to match base
        # `/v1/data/lists/` requests which requires the trailing slash
        - name: lists
          in: '/+([^/]+)/v1/data/lists/(.*)'
          out: '/w/rest.php/readinglists/v0/lists/\2'
        # T397203: non-restbase replacement for the old /?spec path that returned JSON
        - name: spec-json-wikimedia
          in: '/wikimedia\.org/v1/'
          out: '/api/restbase_specs/rest_v1-wikimedia.json'
          to: meta.wikimedia.org
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-wikidata
          in: '/(www|test)\.wikidata\.org/v1/'
          out: '/api/restbase_specs/rest_v1-wikidata.json'
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-commons
          in: '/(commons|test-commons)\.wikimedia\.org/v1/'
          out: '/api/restbase_specs/rest_v1-commons.json'
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-wikipedia
          in: '/[^./]+\.wikipedia\.org/v1/'
          out: '/api/restbase_specs/rest_v1-wikipedia.json'
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-wiktionary
          in: '/[^./]+\.wiktionary\.org/v1/'
          out: '/api/restbase_specs/rest_v1-wiktionary.json'
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-wikivoyage
          in: '/[^./]+\.wikivoyage\.org/v1/'
          out: '/api/restbase_specs/rest_v1-wikivoyage.json'
          query_parameters:
            - name: spec
              present_match: true
        - name: spec-json-default
          in: '/(wikisource|www\.mediawiki|[^./]+\.(wikisource|wikibooks|wikiversity|wikiquote|wikimedia))\.org/v1/'
          out: '/api/restbase_specs/rest_v1-default.json'
          query_parameters:
            - name: spec
              present_match: true
      rb_response_headers: true

    - name: mw-rest-auth
      timeout: 15s
      cluster: mw-api-ext-ro
      csp_enabled: false
      jwt: allow_missing_or_failed
      rate_limit_policies: [ "BYPASS", "BYPASS" ]
      urls:
        - name: oauth2
          in: '/+w/rest.php/oauth2(.*)'
          out: '/w/rest.php/oauth2\1'
    - name: mw-rest-php
      timeout: 15s
      # This set of routes uses the same cluster as mw-api-ext - however
      # it does NOT use the restbase compability headers as this will
      # lead to incorrect responses from the mw APIs.

      # These routes also do not use the restbase response headers as
      # we will either need to put in a more specific set of headers
      # befitting the mw apis, or to simply defer to the headers
      # mediawiki sends.

      # The name is misleading, as it's not a different deployment than mw-api-ext
      # However, in normal operation, it always points to the DC-local deployment.
      # As long as ATS multi-DC routing does the right thing, this will allow requests
      # sent from ATS to the secondary datacenter to stay there instead of crossing back
      # to the primary.
      cluster: mw-api-ext-ro
      csp_enabled: false
      urls:
        # *** BEGIN rest.php APIs ***
        # campaignevents
        - name: campaignevents
          in: '/+w/rest.php/campaignevents(.*)'
          out: '/w/rest.php/campaignevents\1'
        # checkuser
        - name: checkuser
          in: '/+w/rest.php/checkuser(.*)'
          out: '/w/rest.php/checkuser\1'
        # eventbus
        - name: eventbus
          in: '/+w/rest.php/eventbus(.*)'
          out: '/w/rest.php/eventbus\1'
        # growthexperiments
        - name: growthexperiments
          in: '/+w/rest.php/growthexperiments(.*)'
          out: '/w/rest.php/growthexperiments\1'
        # ipinfo
        - name: ipinfo
          in: '/+w/rest.php/ipinfo(.*)'
          out: '/w/rest.php/ipinfo\1'
        # mathoid?
        - name: math_html
          in: '/+w/rest.php/math/v0/popup/html(.*)'
          out: '/w/rest.php/math/v0/popup/html\1'
        # reportincident
        - name: reportincident
          in: '/+w/rest.php/reportincident/v0/report'
          out: '/w/rest.php/reportincident/v0/report'
        # securepoll
        - name: securepoll
          in: '/+w/rest.php/securepoll(.*)'
          out: '/w/rest.php/securepoll\1'
        # sitemap
        - name: sitemap
          in: '/+w/rest.php/site/v1/sitemap(.*)'
          out: '/w/rest.php/site/v1/sitemap\1'
        # file
        - name: file
          in: '/+w/rest.php/v1/file(.*)'
          out: '/w/rest.php/v1/file\1'
        # page
        - name: page
          in: '/+w/rest.php/v1/page(.*)'
          out: '/w/rest.php/v1/page\1'
        # revision
        - name: revision
          in: '/+w/rest.php/v1/revision(.*)'
          out: '/w/rest.php/v1/revision\1'
        - name: search
          in: '/+w/rest.php/v1/search(.*)'
          out: '/w/rest.php/v1/search\1'
        # transforms - NOTE: these do not overlap (even if they
        # mirror) the existing restbase rules. restbase rules rewrite
        # restbase paths to use the same paths. Both are needed
        - name: transform
          in: '/+w/rest.php/v1/transform(.*)'
          out: '/w/rest.php/v1/transform\1'
        # flaggedrevs
        - name: flaggedrevs
          in: '/+w/rest.php/flaggedrevs(.*)'
          out: '/w/rest.php/flaggedrevs\1'
        # searchvue
        - name: searchvue
          in: '/+w/rest.php/searchvue(.*)'
          out: '/w/rest.php/searchvue\1'
        # wikifunctions
        - name: wikifunctions
          in: '/+w/rest.php/wikifunctions(.*)'
          out: '/w/rest.php/wikifunctions\1'
        - name: wikimediacampaignevents
          in: '/+w/rest.php/wikimediacampaignevents(.*)'
          out: '/w/rest.php/wikimediacampaignevents\1'
        - name: content
          in: '/+w/rest.php/content(.*)'
          out: '/w/rest.php/content\1'
        - name: specs
          in: '/+w/rest.php/specs(.*)'
          out: '/w/rest.php/specs\1'
        - name: wikibase
          in: '/+w/rest.php/wikibase(.*)'
          out: '/w/rest.php/wikibase\1'
        # This case catches remaining rest.php traffic that is not
        # matched by any existing rule. This shouldn't be something we
        # hit, and if it is regularly hit it should be investigated to
        # add suitable rules.
        - name: rest_php_unmatched
          in: '/+w/rest.php(.*)'
          out: '/w/rest.php\1'
        # *** END rest.php APIs ***
        #
        # *** START REST API sandbox ***
        # T396807: REST API sandbox migration (these routes must go after the /?spec routes)
        #
        # It may seem strange to have these here rather than in the mw-api-ext restbase compatible
        # block, but these are not so much APIs as they are webpages, and the host rewriting causes
        # CSP issues that we can't override per-route, breaking JS and CSS.
        - name: rest_sandbox_global
          in: '/wikimedia\.org/v1/'
          out: '/wiki/Special:RestSandbox/wmf-restbase-global'
          to: 'meta.wikimedia.org'
          redirect: true
          redirect_code: MOVED_PERMANENTLY
        - name: rest_sandbox_project
          in: '/[^/]+/v1/'
          out: '/wiki/Special:RestSandbox/wmf-restbase'
          redirect: true
          redirect_code: MOVED_PERMANENTLY
        # *** END REST API sandbox ***
    - name: mw-action-api-nolimit
      # We set a higher timeout to allow for long queries on the search API
      timeout: 53s
      cluster: mw-api-ext-ro
      csp_enabled: false
      rate_limit_policies: [ "BYPASS", "BYPASS" ]
      urls:
        # Exclude cspreports and login calls from rate limits
        - name: allowed_action
          in: '/+w/api.php(.*)'
          out: '/w/api.php\1'
          query_parameters:
            - name: action
              string_match:
                safe_regex:
                  regex: "^(cspreport|login|clientlogin)$"
        # Exclude token queries from rate limits
        - name: meta_query
          in: '/+w/api.php(.*)'
          out: '/w/api.php\1'
          query_parameters:
            - name: action
              string_match:
                exact: 'query'
            - name: meta
              string_match:
                safe_regex:
                  # Tokens and authmanagerinfo trigger the exemption.
                  # Certain other meta-modules are allowed alongside them (e.g. userinfo),
                  # while most additional modules would cancel the exemption when present.
                  regex: ".*(^|\\||%7[Cc])(tokens|authmanagerinfo)($|\\||%7[Cc]).*"
      lua_hooks:
        # Use a hook to determine whether the request can actually be exempt or not.
        ratelimit: [ "wmf_handle_action_api_nolimit" ]
    # Assign rate limit policy for abstract.wikipedia.org.
    # Abstract Wikipedia requires a LOT of API queries, they need to have a separate bucket
    # to avoid locking users out of other things inadvertently.
    # NOTE: This will not catch POST requests that do not have the relevant query parameters!
    - name: mw-action-api-abstractwiki
      # We set a higher timeout to allow for long queries
      timeout: 53s
      cluster: mw-api-ext-ro
      csp_enabled: false
      domain: abstract.wikipedia.org
      rate_limit_policies: [ "AbstractWiki", "BYPASS" ]
      urls:
        - name: action_api_catchall
          in: '/+w/api.php(.*)'
          out: '/w/api.php\1'
    - name: mw-action-api
      # We set a higher timeout to allow for long queries on the search API
      timeout: 53s
      # This set of routes uses the same cluster as mw-api-ext - however
      # it does NOT use the restbase compability headers as this will
      # lead to incorrect responses from the mw APIs.

      # These routes also do not use the restbase response headers as
      # we will either need to put in a more specific set of headers
      # befitting the mw apis, or to simply defer to the headers
      # mediawiki sends.

      # The name is misleading, as it's not a different deployment than mw-api-ext
      # However, in normal operation, it always points to the DC-local deployment.
      # As long as ATS multi-DC routing does the right thing, this will allow requests
      # sent from ATS to the secondary datacenter to stay there instead of crossing back
      # to the primary.
      cluster: mw-api-ext-ro
      csp_enabled: false
      urls:
        # *** BEGIN action API routes ***
        - name: action_api_catchall
          in: '/+w/api.php(.*)'
          out: '/w/api.php\1'
        # *** END action API routes ***
    - name: linkrecommendation
      timeout: 30s
      cluster: linkrecommendation
      csp_enabled: false
      api_cors_enabled: true
      request_headers_to_add:
        - key: cache-control
          value: no-cache
      urls:
        - name: catchall
          in: '/+service/linkrecommendation(.*)'
          out: '/\1'
    - name: mw-core-migrated
      timeout: 15s
      # This set of routes uses the same cluster as mw-api-ext - however
      # it does NOT use the restbase compability headers as this will
      # lead to incorrect responses from the mw APIs.

      # These routes also do not use the restbase response headers as
      # we will either need to put in a more specific set of headers
      # befitting the mw apis, or to simply defer to the headers
      # mediawiki sends.

      # The name is misleading, as it's not a different deployment than mw-api-ext
      # However, in normal operation, it always points to the DC-local deployment.
      # As long as ATS multi-DC routing does the right thing, this will allow requests
      # sent from ATS to the secondary datacenter to stay there instead of crossing back
      # to the primary.
      cluster: mw-api-ext-ro
      csp_enabled: false
      api_cors_enabled: true
      request_headers_to_add:
        - key: cache-control
          value: no-cache
      urls:
        - name: pathing_map_commons
          in: '/+core/v1/commons/(.*)'
          out: '/w/rest.php/v1/\1'
          to: commons.wikimedia.org
        - name: pathing_map_mediawiki
          in: '/+core/v1/mediawiki/(.*)'
          out: '/w/rest.php/v1/\1'
          to: www.mediawiki.org
        - name: pathing_map_wikidata
          in: '/+core/v1/wikidata/(.*)'
          out: '/w/rest.php/v1/\1'
          to: www.wikidata.org
        - name: pathing_map_meta
          in: '/+core/v1/meta/(.*)'
          out: '/w/rest.php/v1/\1'
          to: meta.wikimedia.org
        - name: pathing_map_wikibooks
          in: '/+core/v1/wikibooks/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikibooks.org'
        - name: pathing_map_wikinews
          in: '/+core/v1/wikinews/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikinews.org'
        - name: pathing_map_wikipedia
          in: '/+core/v1/wikipedia/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikipedia.org'
        - name: pathing_map_wikiquote
          in: '/+core/v1/wikiquote/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikiquote.org'
        - name: pathing_map_wikisource
          in: '/+core/v1/wikisource/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikisource.org'
        - name: pathing_map_wikispecies
          in: '/+core/v1/wikispecies/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikispecies.org'
        - name: pathing_map_wikiveristy
          in: '/+core/v1/wikiveristy/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikiveristy.org'
        - name: pathing_map_wikivoyage
          in: '/+core/v1/wikivoyage/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wikivoyage.org'
        - name: pathing_map_wiktionary
          in: '/+core/v1/wiktionary/(\w+)/(.*)'
          out: '/w/rest.php/v1/\2'
          to: '\1.wiktionary.org'

    - name: liftwing_inference
      timeout: 30s
