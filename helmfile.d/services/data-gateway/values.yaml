main_app:
  image: repos/sre/data-gateway
  version: v1.0.14
  command: ["./data-gateway"]
  args: ["-config", "/etc/aqs-http-gateway/config.yaml"]
  service_name: data-gateway
  consistency: localQuorum

  # note the "_"
  cassandra_user: "data_gateway"

  requests:
    cpu: 200m
    memory: 500Mi
  limits:
    cpu: 1
    memory: 1024Mi

  # T423168: Delay initial liveness checks due to gocql client session init
  # slowness in the presence of unavailable Cassandra hosts.
  liveness_probe:
    initialDelaySeconds: 30

resources:
  replicas: 4

mesh:
  enabled: true

ingress:
  enabled: true

monitoring:
  enabled: true
