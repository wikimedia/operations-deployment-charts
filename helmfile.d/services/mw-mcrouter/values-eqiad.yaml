cache:
  mcrouter:
    service:
      clusterIP: 10.64.72.12
      enabled: true
    route_prefix: eqiad/mw
    zone: eqiad
    routes:
      - route: /eqiad/mw
        pool: eqiad-servers
        failover_time: 600
      - route: /codfw/mw
        pool: codfw-servers
        failover_time: 600
      - route: /eqiad/mw-wan
        failover_time: 600
        pool: eqiad-servers
        replica:
          route: /codfw/mw-wan
          pool: codfw-servers
      # T419666: Wikifunctions wf-wan cache route. Served by the shared
      # mw-mcrouter daemonset so that client wikis (e.g. abstract.wikipedia.org)
      # using the {{#function:…}} parser function can reach the wf-*
      # memcached pools.
      - route: /eqiad/wf-wan
        pool: wf-eqiad
        # No failover for wikifunction
        failover_time: 0
        replica:
          route: /codfw/wf-wan
          pool: wf-codfw
