# mw site-specific configurations

common_images:
  mcrouter:
    mcrouter: mcrouter:2023.07.17.00-2-20260412

cache:
  mcrouter:
    service:
      enabled: true
      clusterIP: 10.192.72.12
    timeouts_until_tko: 10
    cross_region_timeout: 300
    route_prefix: codfw/mw
    zone: codfw
    routes:
      - route: /eqiad/mw
        pool: eqiad-servers
        failover_time: 600
      - route: /codfw/mw
        pool: codfw-servers
        failover_time: 600
      - route: /codfw/mw-wan
        pool: codfw-servers
        failover_time: 600
        replica:
          route: /eqiad/mw-wan
          pool: eqiad-servers
      # T419666: Wikifunctions wf-wan cache route. Served by the shared
      # mw-mcrouter daemonset so that client wikis (e.g. abstract.wikipedia.org)
      # using the {{#function:…}} parser function can reach the wf-*
      # memcached pools. (The /local/wf route — used by the wikifunctions
      # service chart with a wforch: modifykey, and by mw-wikifunctions as
      # its default route_prefix for www.wikifunctions.org's general MW
      # cache — is not needed here; client wikis only address /*/wf-wan/
      # and /{dc}/wf-wan/.)
      - route: /codfw/wf-wan
        pool: wf-codfw
        # No failover for wikifunction
        failover_time: 0
        replica:
          route: /eqiad/wf-wan
          pool: wf-eqiad

