main_app:
  image: wikimedia/generated-data-platform-aqs-device-analytics
  version: 2024-06-05-094107-production
  command: ["./device-analytics"]
  args: ["-config", "/etc/aqs-http-gateway/config.yaml"]
  service_name: device-analytics

  consistency: localQuorum

  # note the "_"
  cassandra_user: "device_analytics"

  requests:
    cpu: 200m
    memory: 500Mi
  limits:
    cpu: 1
    memory: 1024Mi
  log_level: debug

  # T423168: Delay initial liveness checks due to gocql client session init
  # slowness in the presence of unavailable Cassandra hosts.
  liveness_probe:
    initialDelaySeconds: 30

resources:
  replicas: 4

mesh:
  enabled: true
  public_port: 4972

ingress:
  enabled: false

service:
  deployment: production
  port:
    nodePort: 4972

monitoring:
  enabled: true
