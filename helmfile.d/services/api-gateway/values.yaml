# DEPRECATION NOTICE
# The api-gateway is deprecated and should not get new routes added
# Please add new routes to helmfile.d/services/rest-gateway/values.yaml

main_app:
  version: 1.35.9-1
  telemetry_port: 1667

  jwt:
    enabled: true
    issuer: https://meta.wikimedia.org

  ratelimiter:
    enabled: false

  strip_api_cookies: true

  access_log:
    # Disable access log but enable 5xx logging and sample 1%
    enabled: false
    sample_percentage: 1
  normalise_paths: true

  endpoints: ~
  discovery_endpoints: ~

  readiness_probe:
    httpGet:
      path: /healthz
      port: 8087
      scheme: HTTPS


service:
  deployment: production
  port:
    nodePort: 8087

mesh:
  enabled: true
  certmanager:
    extraFQDNs:
      - '*.m.mediawiki.org'
      - '*.m.wikibooks.org'
      - '*.m.wikidata.org'
      - '*.m.wikimedia.org'
      - '*.m.wikimediafoundation.org'
      - '*.m.wikinews.org'
      - '*.m.wikipedia.org'
