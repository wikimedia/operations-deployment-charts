# DEPRECATION NOTICE
# The api-gateway is deprecated and should not get new routes added
# Please add new routes to helmfile.d/services/rest-gateway/values.yaml

main_app:
  mw_api:
    host: &mw_api_host mw-api-int.discovery.wmnet
    port: &mw_api_port 4446
    ips:
      - 10.2.2.81/32
      - 10.2.1.81/32

  domains:
    - api.wikimedia.org
    - api.wikimedia.org:*
    - api-gateway.discovery.wmnet
    - api-gateway.discovery.wmnet:*
    - api-gateway-ro.discovery.wmnet
    - api-gateway-ro.discovery.wmnet:*
    - "*"
    - "*:*"

  access_log:
    debug: false

  ratelimiter:
    log_level: warning

  endpoints:
    mwapi_cluster:
      tls: true
      type: STRICT_DNS
      hosts:
        *mw_api_host: *mw_api_port
    appserver_cluster:
      tls: true
      type: STRICT_DNS
      hosts:
        mw-web.discovery.wmnet: 4450

resources:
  replicas: 1

networkpolicy:
  egress:
    enabled: true
