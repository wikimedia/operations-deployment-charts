resources:
  replicas: 1

dns:
  nameserver: 10.64.76.4  # coredns-internalonly
  nodeDomain: eqiad.wmnet

main_app:
  requests:
    cpu: 1
    memory: 200Mi
  limits:
    cpu: 1
    memory: 1Gi

ingress:
  staging: true

mesh:
  tracing:
    enabled: false  # not supported in staging

cache:
  mcrouter:
    enabled: true
    route_prefix: local/wf
    zone: eqiad
    routes:
      - route: /local/wf
        pool: wf-eqiad
        modifykey:
          prefix: "stagingorch:"
        # No failover for wikifunction
        failover_time: 0
      - route: /eqiad/wf-wan
        pool: wf-eqiad
        modifykey:
          prefix: "stagingorch:"
        failover_time: 0
        replica:
          route: /codfw/wf-wan
          pool: wf-codfw
