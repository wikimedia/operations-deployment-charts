# Over-ride values for the Python evaluator

main_app:
  image: repos/abstract-wiki/wikifunctions/function-evaluator/rusty-py
  version: 2026-06-06-013944
  requests:
    cpu: 4
    memory: 800Mi
  limits:
    cpu: 6
    memory: 1Gi

config:
  public:
    # Set a nicer name for the OpenTelemetry entries than 'unknown_service'
    OTEL_SERVICE_NAME: wikifunctions-evaluator-rust-python
    FUNCTION_EVALUATOR_TIMEOUT_MS: "9000"
    EXECUTOR_ROOT: /srv/executors
    EXECUTOR_PROCESS_POOL_SIZE: "5"
    WASMTIME_FUEL_LIMIT: "10000000000"
    WASMTIME_MEMORY_PAGES: "10000"
    MAX_REQUESTS_PER_ID: "100"

