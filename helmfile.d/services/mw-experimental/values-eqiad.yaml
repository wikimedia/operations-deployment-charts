#mw-site specific configuration
# Temporarily enable in-pod mcrouter for T411807 experimentation
cache:
  mcrouter:
    enabled: true
    routes:
      - route: /eqiad/mw
        pool: eqiad-servers
        failover_time: 600
      - route: /codfw/mw
        pool: codfw-servers
        failover_time: 600
      - route: /eqiad/mw-wan
        failover_time: 600
        pool: eqiad-servers
        replica:
          route: /codfw/mw-wan
          pool: codfw-servers
      - route: /eqiad/wf-wan
        pool: wf-eqiad
        failover_time: 0
        replica:
          route: /codfw/wf-wan
          pool: wf-codfw
php:
  envvars:
    MCROUTER_SERVER: "127.0.0.1:11213"
