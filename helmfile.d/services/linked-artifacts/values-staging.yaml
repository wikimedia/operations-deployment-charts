main_app:
  log_level: debug
  version: v1.4.0

  hoarde:
    tables:
      echo:
        lambda:
          type: grpc
          hostname: cassandra-dev2001-a.codfw.wmnet
          port: 50051
          timeout: 5000ms
      article_topics:
        lambda:
          type: kserve_v2
          hostname: inference-staging.svc.codfw.wmnet
          port: 30443
          model_name: outlink-topic-model
          content_type: application/json
          tls:
            ca: /etc/ssl/certs/ca-certificates.crt
            authority: outlink-topic-model.articletopic-outlink.wikimedia.org

resources:
  replicas: 1

ingress:
  staging: true

# Added temporarily for testing — T421444
networkpolicy:
  egress:
    enabled: true
    dst_nets:
      - cidr: 10.192.16.14/32 # cassandra-dev2001-a
        ports:
          - protocol: tcp
            port: 50051

      - cidr: 10.2.1.58/32 # inference-staging.svc.codfw.wmnet (codfw)
        ports:
          - protocol: tcp
            port: 30443
