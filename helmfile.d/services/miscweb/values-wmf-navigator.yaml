main_app:
  image: repos/projects/wmf-navigator
  version: 2026-05-11-072134-web
  limits:
    cpu: 200m
    memory: 200Mi
  requests:
    cpu: 100m
    memory: 100Mi
  volumeMounts:
    - name: miscweb-wmf-navigator-secret-config
      mountPath: /etc/secrets/google_application_credentials.json
      subPath: GOOGLE_APPLICATION_CREDENTIALS_SECRET
      readOnly: true
    - name: miscweb-wmf-navigator-secret-config
      mountPath: /etc/secrets/okta_private.pem
      subPath: OKTA_PRIVATE_KEY
      readOnly: true
  volumes:
    - name: miscweb-wmf-navigator-secret-config
      secret:
        secretName: miscweb-wmf-navigator-secret-config
    - name: data-sync-output-dir
      emptyDir: {}

sidecars:
  navigator-backend:
    enabled: true
    image: repos/projects/wmf-navigator
    version: 2026-05-11-072134-navigator-backend
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
    volumeMounts:
      - name: data-sync-output-dir
        mountPath: /data
  data-sync:
    enabled: true
    image: repos/projects/wmf-navigator
    version: 2026-05-11-072134-data-sync
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
    volumeMounts:
      - name: data-sync-output-dir
        mountPath: /data
      - name: miscweb-wmf-navigator-secret-config
        mountPath: /etc/secrets/google_application_credentials.json
        subPath: GOOGLE_APPLICATION_CREDENTIALS_SECRET
        readOnly: true
      - name: miscweb-wmf-navigator-secret-config
        mountPath: /etc/secrets/okta_private.pem
        subPath: OKTA_PRIVATE_KEY
        readOnly: true
    command: ["/app/packages/data-sync/bin/sync-to-data-dir.sh"]

mesh:
  enabled: true
  public_port: 4111

ingress:
  enabled: true
  gatewayHosts:
    extraFQDNs:
    - wmf-navigator.wikimedia.org

config:
  public: # Add here all the keys that can be publicly available as a ConfigMap
    DATA_DIR: 'packages/data-api/data'
    PORT: '3000'
    CORS_ORIGINS: 'http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080'
    OBJECTIVES_EXPORT_SHEET_URL: ''
    OBJECTIVES_WORKBOOK_PATH: ''
    OKTA_ISSUER: 'https://wikimedia.okta.com'
    OKTA_SCOPES: okta.users.read
    OKTA_USERS_QUERY: ''
    OKTA_USERS_LIMIT: '200'
    OKTA_API_BASE_URL: ''
    OKTA_TOKEN_URL: ''
    OKTA_MANAGER_ID_FIELD: 'managerId'
    OKTA_PRIVATE_KEY_PATH: '/etc/secrets/okta_private.pem'
    GOOGLE_APPLICATION_CREDENTIALS: '/etc/secrets/google_application_credentials.json'
    HTTP_PROXY: "http://url-downloader.eqiad.wikimedia.org:8080"
    HTTPS_PROXY: "http://url-downloader.eqiad.wikimedia.org:8080"
    NO_PROXY: "localhost,127.0.0.1,office.wikimedia.org"
    NODE_USE_ENV_PROXY: 1
    OFFICE_WIKI_BASE_URL: "http://localhost:6501"
    MEDIAWIKI_BASE_URL: "http://localhost:6501"
    OIDC_ISSUER: "https://wikimedia.okta.com"

external_services:
  urldownloader: [wikimedia]

discovery:
  listeners:
    - mw-api-int

networkpolicy:
  egress:
    enabled: true