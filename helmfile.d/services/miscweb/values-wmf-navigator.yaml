main_app:
  image: repos/projects/wmf-navigator
  version: 2026-05-06-033217-web
  limits:
    cpu: 200m
    memory: 200Mi
  requests:
    cpu: 100m
    memory: 100Mi
  volumeMounts:
    - name: miscweb-wmf-navigator-secret-config
      mountPath: /etc/secrets/google_application_credentials.json
      subPath: GOOGLE_APPLICATION_CREDENTIALS_SECRET
      readOnly: true
    - name: miscweb-wmf-navigator-secret-config
      mountPath: /etc/secrets/okta_private.pem
      subPath: OKTA_PRIVATE_KEY
      readOnly: true
  volumes:
    - name: miscweb-wmf-navigator-secret-config
      secret:
        secretName: miscweb-wmf-navigator-secret-config
    - name: data-sync-output-dir
      emptyDir: {}

sidecars:
  navigator-backend:
    enabled: true
    image: repos/projects/wmf-navigator
    version: 2026-05-06-033217-navigator-backend
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
    volumeMounts:
      - name: data-sync-output-dir
        mountPath: /data
  data-sync:
    enabled: true
    image: repos/projects/wmf-navigator
    version: 2026-05-06-033217-data-sync
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi
    volumeMounts:
      - name: data-sync-output-dir
        mountPath: /data
    command: ["/app/packages/data-sync/bin/sync-to-data-dir.sh"]

mesh:
  enabled: true
  public_port: 4111

ingress:
  enabled: true
  gatewayHosts:
    extraFQDNs:
    - wmf-navigator.wikimedia.org

config:
  public: # Add here all the keys that can be publicly available as a ConfigMap
    DATA_DIR: 'packages/data-api/data'
    PORT: '3000'
    CORS_ORIGINS: 'http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080'
    VITE_API_BASE_URL: ''
    OBJECTIVES_SHEET_URL: 'https://docs.google.com/spreadsheets/d/1g3DCj9CkdBMGNfuv0c_u45LISpMfeRrwCb2norNcADE'
    OBJECTIVES_EXPORT_SHEET_URL: ''
    OBJECTIVES_WORKBOOK_PATH: ''
    OKTA_ISSUER: 'https://wikimedia.okta.com'
    OKTA_SCOPES: okta.users.read
    OKTA_USERS_QUERY: ''
    OKTA_USERS_LIMIT: '200'
    OKTA_API_BASE_URL: ''
    OKTA_TOKEN_URL: ''
    OKTA_MANAGER_ID_FIELD: 'managerId'
    OKTA_PRIVATE_KEY_PATH: '/etc/secrets/okta_private.pem'
    GOOGLE_APPLICATION_CREDENTIALS: '/etc/secrets/google_application_credentials.json'

networkpolicy:
  egress:
    enabled: true
    dst_nets:
    - cidr: 208.80.154.224/32 # text-lb.eqiad (for office wiki access)
      ports:
      - protocol: TCP
        port: 80
      - protocol: TCP
        port: 443
    - cidr: 2620:0:861:ed1a::1/128 # text-lb.codfw (for office wiki access)
      ports:
      - protocol: TCP
        port: 80
      - protocol: TCP
        port: 443
