{{- if .Values.storageClass.create -}}
{{ range $storageClass := $.Values.storageClass.classes }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ $storageClass.name }}
{{- if $storageClass.annotations }}
  annotations:
{{ toYaml $storageClass.annotations | indent 4 }}
{{- end }}
  labels:
    app: {{ include "ceph-csi-rbd.name" $ }}
    chart: {{ include "ceph-csi-rbd.chart" $ }}
    release: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
provisioner: {{ $.Values.driverName }}
parameters:
  clusterID: {{ $storageClass.clusterID }}
  pool: {{ $storageClass.pool }}
  imageFeatures: {{ $storageClass.imageFeatures }}
{{- if $storageClass.tryOtherMounters }}
  tryOtherMounters: {{ $storageClass.tryOtherMounters | quote}}
{{- end }}
{{- if $storageClass.mounter }}
  mounter: {{ $storageClass.mounter }}
{{- end }}
{{- if $storageClass.cephLogDir }}
  cephLogDir: {{ $storageClass.cephLogDir }}
{{- end }}
{{- if $storageClass.cephLogStrategy }}
  cephLogStrategy: {{ $storageClass.cephLogStrategy }}
{{- end }}
{{- if $storageClass.dataPool }}
  dataPool: {{ $storageClass.dataPool }}
{{- end }}
{{- if $storageClass.volumeNamePrefix }}
  volumeNamePrefix: "{{ $storageClass.volumeNamePrefix }}"
{{- end }}
{{- if $storageClass.encrypted }}
  encrypted: "{{ $storageClass.encrypted }}"
{{- end }}
{{- if $storageClass.encryptionKMSID }}
  encryptionKMSID: {{ $storageClass.encryptionKMSID }}
{{- end }}
{{- if $storageClass.topologyConstrainedPools }}
  topologyConstrainedPools:
  {{ toYaml $storageClass.topologyConstrainedPools | indent 4 -}}
{{- end }}
{{- if $storageClass.mapOptions }}
  mapOptions: {{ $storageClass.mapOptions }}
{{- end }}
{{- if $storageClass.unmapOptions }}
  unmapOptions: {{ $storageClass.unmapOptions }}
{{- end }}
  csi.storage.k8s.io/provisioner-secret-name: {{ $storageClass.provisionerSecret }}
{{- if $storageClass.provisionerSecretNamespace }}
  csi.storage.k8s.io/provisioner-secret-namespace: {{ $storageClass.provisionerSecretNamespace }}
{{ else }}
  csi.storage.k8s.io/provisioner-secret-namespace: {{ $.Release.Namespace }}
{{- end }}
  csi.storage.k8s.io/controller-expand-secret-name: {{ $storageClass.controllerExpandSecret }}
{{- if $storageClass.controllerExpandSecretNamespace }}
  csi.storage.k8s.io/controller-expand-secret-namespace: {{ $storageClass.controllerExpandSecretNamespace }}
{{ else }}
  csi.storage.k8s.io/controller-expand-secret-namespace: {{ $.Release.Namespace }}
{{- end }}
  csi.storage.k8s.io/node-stage-secret-name: {{ $storageClass.nodeStageSecret }}
{{- if $storageClass.nodeStageSecretNamespace }}
  csi.storage.k8s.io/node-stage-secret-namespace: {{ $storageClass.nodeStageSecretNamespace }}
{{ else }}
  csi.storage.k8s.io/node-stage-secret-namespace: {{ $.Release.Namespace }}
{{- end }}
  csi.storage.k8s.io/fstype: {{ $storageClass.fstype }}
reclaimPolicy: {{ $storageClass.reclaimPolicy }}
allowVolumeExpansion: {{ $storageClass.allowVolumeExpansion }}
{{- if $storageClass.mountOptions }}
mountOptions:
  {{- range $storageClass.mountOptions }}
  - {{ . }}
  {{- end }}
{{- end }}
{{- end }}
{{- end -}}
