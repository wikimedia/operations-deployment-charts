      port: {{ .Values.monitoring.port }}
      targetPort: {{ .Values.monitoring.port }}
    - name: http-profiling
      port: 8008
      targetPort: 8008
    - name: https-webhook
      port: 443
      targetPort: 8443
  selector:
    role: webhook

