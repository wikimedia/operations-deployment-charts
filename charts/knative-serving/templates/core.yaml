            httpGet:
              path: /readiness
              port: probes
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 3
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.port }}
            - name: profiling
              containerPort: 8008
            - name: probes
              containerPort: 8080
