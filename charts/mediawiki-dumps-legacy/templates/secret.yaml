apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: ssh-private-key
  {{- include "base.meta.labels" . | indent 2 }}
  namespace: {{ .Release.Namespace }}
data:
  id_rsa: |
    {{- $.Values.dumps.rsync.ssh_private_key | b64enc | nindent 4 }}

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: mariadb-client-config
  {{- include "base.meta.labels" . | indent 2 }}
  namespace: {{ .Release.Namespace }}
stringData:
  my-client.cnf: |
    [client]
    user={{ $.Values.mariadb.wikiadmin_user }}
    password={{ $.Values.mariadb.wikiadmin_password }}
{{- if .Values.s3_tokens }}
{{- $root := . }}
{{- range .Values.s3_tokens }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: s3-token-{{ required "account_reference is required" .account_reference }}
  {{- include "base.meta.labels" $root | indent 2 }}
  namespace: {{ $root.Release.Namespace }}
data:
  aws_access_key_id: {{ required "aws_access_key_id is required" .aws_access_key_id | b64enc | quote }}
  aws_secret_access key: {{ required "aws_secret_access_key is required" .aws_secret_access_key | b64enc | quote }}
{{- end }}
{{- end }}
