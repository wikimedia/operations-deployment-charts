---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  {{- include "base.meta.metadata" (dict "Root" .) | indent 2 }}
spec:
  selector:
    istio: ingressgateway
  servers:
  - hosts:
    {{- range $fqdn := $.Values.certificate.extraFQDNs }}
      - {{ $fqdn }}
    {{- end }}
    port:
      name: https
      number: 443
      protocol: HTTPS
    tls:
      credentialName: {{ .Release.Namespace }}-tls-certificate
      mode: SIMPLE

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  {{- include "base.meta.metadata" (dict "Root" .) | indent 2 }}
spec:
  gateways:
  - {{ template "base.meta.name" (dict "Root" .) }}
  hosts:
  {{- range $fqdn := $.Values.certificate.extraFQDNs }}
    - {{ $fqdn }}
  {{- end }}
  http:
  - name: bulk
    match:
    - uri:
        regex: "^/(?:[^/]+/)?_bulk(?:/stream)?$"
    headers:
      request:
        remove:
        - x-request-id
    route:
    - destination:
        host: {{ $.Values.opensearchCluster.general.serviceName }}-bulk.{{ $.Release.Namespace }}.svc.cluster.local
        port:
          number: {{ $.Values.opensearchCluster.general.httpPort }}

  - name: default
    headers:
      request:
        remove:
        - x-request-id
    route:
    - destination:
        host: {{ $.Values.opensearchCluster.general.serviceName }}.{{ $.Release.Namespace }}.svc.cluster.local
        port:
          number: {{ $.Values.opensearchCluster.general.httpPort }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "base.meta.name" (dict "Root" .) }}
  {{- include "base.meta.labels" . | indent 2 }}
spec:
  host: {{ $.Values.opensearchCluster.general.serviceName }}.{{ $.Release.Namespace }}.svc.cluster.local
  {{- include "opensearch.destinationRuleTrafficPolicy" . | nindent 2 }}

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "base.meta.name" (dict "Root" .) }}-bulk
  {{- include "base.meta.labels" . | indent 2 }}
spec:
  host: {{ $.Values.opensearchCluster.general.serviceName }}-bulk.{{ $.Release.Namespace }}.svc.cluster.local
  {{- include "opensearch.destinationRuleTrafficPolicy" . | nindent 2 }}
