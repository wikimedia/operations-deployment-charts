apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.k8s_app }}
  labels:
    {{- include "coredns.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      k8s-app: {{ .Values.k8s_app }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
      - port: 5353
        protocol: UDP
      - port: 5353
        protocol: TCP
      - port: 9153
        protocol: TCP
