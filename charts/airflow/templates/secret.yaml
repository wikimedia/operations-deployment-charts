apiVersion: v1
kind: Secret
metadata:
{{- include "base.meta.metadata" (dict "Root" . "Name" "secret-config" ) | indent 2 }}
type: Opaque
{{- if .Values.config.private }}
data: {{- range $k := (keys .Values.config.private | sortAlpha) }}
  {{ $k }}: {{ get $.Values.config.private $k | b64enc | quote }}
{{- end -}}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "release.name" . }}-connections-variables
  {{- include "base.meta.labels" . | indent 2 }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  connections.yaml: |
    {{- tpl ( toYaml $.Values.config.connections) $ | nindent 4 }}
  {{- range $filename, $file_template := $.Values.config.extra_secrets }}
  {{ $filename }}: |
    {{- tpl $file_template $ | nindent 4 }}
  {{- end }}

---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ template "release.name" . }}-kerberos-keytab
  {{- include "base.meta.labels" . | indent 2 }}
  namespace: {{ $.Release.Namespace }}
data:
  airflow.keytab: |
    {{- $.Values.kerberos.keytab | default (b64enc "override_me") | nindent 4 }}

{{- /*
  Standalone, custom-named Secrets, consumed by task pods via secretKeyRef.
  We deliberately do NOT route these through config.private / <release>-secret-config:
  every config.private key is also injected as an env var on the scheduler, webserver and
  worker pods (see the app.airflow.env helper), so a credential placed there is exposed in
  the environment of pods that never use it. Rendering a dedicated Secret keeps the value
  scoped to only the task pods that explicitly reference it. Values come from
  config.private_secrets (not config.private) for the same reason; empty values are skipped.
*/}}
{{- range $secret_name, $secret_data := .Values.config.extra_k8s_secrets }}
{{- $rendered := dict }}
{{- range $key, $value := $secret_data }}
{{- $v := tpl (toString $value) $ }}
{{- if $v }}
{{- $_ := set $rendered $key $v }}
{{- end }}
{{- end }}
{{- if $rendered }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $secret_name }}
  {{- include "base.meta.labels" $ | indent 2 }}
  namespace: {{ $.Release.Namespace }}
stringData:
  {{- range $key, $value := $rendered }}
  {{ $key }}: |
    {{- $value | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

{{- if $.Values.rsync.enabled }}
{{- range $target, $ssh_config := $.Values.rsync.ssh.targets }}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ template "release.name" $ }}-ssh-privkey-{{ $target }}
  {{- include "base.meta.labels" $ | indent 2 }}
  namespace: {{ $.Release.Namespace }}
data:
  {{- $ssh_config.private_key.filename | nindent 2 }}: |
    {{- b64enc ($ssh_config.private_key.content | default "override_me") | nindent 4 }}
{{- end }}
{{- end }}
