apiVersion: v1
kind: Secret
metadata:
  name: {{ template "base.name.release" . }}-secret-config
  labels:
    app: {{ template "base.name.chart" . }}
    chart: {{ template "base.name.chartid" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
data:
{{- /* Globale private Config */ -}}
{{- if .Values.config.private }}
{{- range $k := (keys .Values.config.private | sortAlpha) }}
{{ $k }}: {{ get $.Values.config.private $k | b64enc | quote }}
{{- end }}
{{- end }}
{{- /* Sidecar private Config */ -}}
{{- range $name, $sidecar := .Values.sidecars }}
{{- if $sidecar.config.private }}
{{- range $k := (keys $sidecar.config.private | sortAlpha) }}
{{ $k }}: {{ get $sidecar.config.private $k | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}