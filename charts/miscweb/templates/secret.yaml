apiVersion: v1
kind: Secret
metadata:
  name: {{ template "base.name.release" . }}-secret-config
  labels:
    app: {{ template "base.name.chart" . }}
    chart: {{ template "base.name.chartid" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque

{{- $secretData := mergeOverwrite (dict) (default (dict) .Values.config.private) }}

{{- range $name, $sidecar := .Values.sidecars }}
  {{- if $sidecar.enabled }}
    {{- $secretData = mergeOverwrite $secretData (default (dict) (dig "config" "private" (dict) $sidecar)) }}
  {{- end }}
{{- end }}

{{- if $secretData }}
data:
{{- range $k, $v := $secretData }}
  {{ $k }}: {{ $v | b64enc | quote }}
{{- end }}
{{- end }}